<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>STRIKERS '45</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; background:#0a0e1a; overflow:hidden; touch-action:none; overscroll-behavior:none; font-family:'Courier New',monospace; position:fixed; inset:0; }
  #wrap { position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#123; image-rendering:pixelated; }
  #ui {
    position:absolute; inset:0; pointer-events:none;
    display:flex; align-items:center; justify-content:center;
  }
  .panel {
    pointer-events:auto; text-align:center; color:#e8f0ff;
    background:rgba(6,10,24,.88); border:2px solid #3a86ff;
    padding:28px 24px; max-width:90vw;
    box-shadow:0 0 24px rgba(58,134,255,.35), inset 0 0 40px rgba(58,134,255,.08);
  }
  .panel h1 {
    font-size:clamp(28px, 9vw, 42px); letter-spacing:5px; color:#ffd166; margin-bottom:6px;
    text-shadow:0 0 12px rgba(255,209,102,.6), 3px 3px 0 #a4133c;
  }
  .panel .sub { color:#8ecae6; font-size:13px; letter-spacing:3px; margin-bottom:22px; }
  .panel .score-line { font-size:20px; color:#fff; margin-bottom:16px; }
  .panel .hint { font-size:12px; color:#6c7a9c; line-height:1.9; margin-bottom:20px; }
  .btn {
    display:inline-block; cursor:pointer; font-family:inherit;
    background:#ffd166; color:#0a0e1a; border:none;
    font-size:18px; font-weight:bold; letter-spacing:3px;
    padding:16px 44px; box-shadow:0 4px 0 #b8860b;
  }
  .btn:active { transform:translateY(3px); box-shadow:0 1px 0 #b8860b; }
  #bombBtn {
    position:absolute; right:calc(14px + env(safe-area-inset-right, 0px));
    bottom:calc(20px + env(safe-area-inset-bottom, 0px));
    width:80px; height:80px;
    border-radius:50%; border:3px solid #ff5d8f; background:rgba(164,19,60,.55);
    color:#fff; font-family:inherit; font-weight:bold; font-size:13px; letter-spacing:1px;
    pointer-events:auto; display:none; text-shadow:0 1px 2px #000;
    box-shadow:0 0 16px rgba(255,93,143,.35);
  }
  #bombBtn:active { background:rgba(255,93,143,.8); transform:scale(.94); }
  .hidden { display:none !important; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="ui">
    <div class="panel" id="menuPanel">
      <h1>STRIKERS '45</h1>
      <div class="sub">VERTICAL ASSAULT</div>
      <div class="hint">
        이동: 방향키 / WASD / 터치 드래그<br>
        발사: 자동 &nbsp;|&nbsp; 폭탄: B키 / 폭탄 버튼<br>
        ★ P 파워업 &nbsp; B 폭탄 &nbsp;|&nbsp; 목숨 무한 ♥∞
      </div>
      <button class="btn" id="startBtn">START</button>
    </div>
    <div class="panel hidden" id="overPanel">
      <h1 style="color:#ff5d8f; text-shadow:0 0 12px rgba(255,93,143,.6), 3px 3px 0 #14213d;">GAME OVER</h1>
      <div class="score-line" id="finalScore">SCORE 0</div>
      <div class="hint" id="bestScore">BEST 0</div>
      <button class="btn" id="retryBtn">RETRY</button>
    </div>
  </div>
  <button id="bombBtn">BOMB<br><span id="bombBtnCnt">5</span></button>
</div>

<script>
(() => {
"use strict";
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ---- 화면 크기 (기기 화면 비율에 맞춰 꽉 채움) ----
let W = 420, H = 720, scale = 1;
function resize() {
  const vw = window.innerWidth, vh = window.innerHeight;
  W = 420;
  H = Math.max(560, Math.min(1000, Math.round(W * vh / vw)));
  scale = Math.min(vw / W, vh / H);
  canvas.width = W; canvas.height = H;
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));
resize();

// 모바일: 더블탭 확대·길게 눌러 메뉴 방지
document.addEventListener('dblclick', e => e.preventDefault());
document.addEventListener('contextmenu', e => e.preventDefault());

// ---- 유틸 ----
const rand = (a, b) => a + Math.random() * (b - a);
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const dist2 = (a, b) => { const dx = a.x - b.x, dy = a.y - b.y; return dx*dx + dy*dy; };

// ---- 게임 상태 ----
const S = { MENU:0, PLAY:1, OVER:2 };
let state = S.MENU;
let score = 0, best = 0, frame = 0, wave = 0, shake = 0;
let stage = 1, banner = null;

// 스테이지 테마 (보스 격파 시 다음 지역으로)
const THEMES = [
  { name:'OCEAN',  top:'#14345c', bot:'#0d2547', wave:'rgba(140,200,255,.08)', land:'#2a5b3f', edge:'#e9d8a6' },
  { name:'JUNGLE', top:'#1b4332', bot:'#081c15', wave:'rgba(149,213,178,.07)', land:'#2d6a4f', edge:'#40916c' },
  { name:'DESERT', top:'#b08968', bot:'#7f5539', wave:'rgba(255,255,255,.06)', land:'#9c6644', edge:'#ede0d4' },
  { name:'NIGHT CITY', top:'#10002b', bot:'#240046', wave:'rgba(255,255,255,.04)', land:'#3c096c', edge:'#5a189a', city:true }
];

let player, bullets, eBullets, enemies, powerups, particles, islands, clouds, boss;

function initRun() {
  score = 0; frame = 0; wave = 0; shake = 0; boss = null; bossCount = 0;
  stage = 1; banner = { text: 'STAGE 1 — OCEAN', life: 130 };
  player = {
    x: W/2, y: H - 90, r: 12,
    speed: 4.6, power: 1, bombs: 5, lives: 3,
    inv: 90, cool: 0, alive: true, respawn: 0
  };
  bullets = []; eBullets = []; enemies = []; powerups = []; particles = [];
  islands = []; clouds = [];
  for (let i = 0; i < 4; i++) islands.push(newIsland(rand(-H, H)));
  for (let i = 0; i < 5; i++) clouds.push(newCloud(rand(-H, H)));
}

function newIsland(y) {
  const blobs = [];
  const n = 4 + Math.floor(rand(0, 4));
  for (let i = 0; i < n; i++) blobs.push({ dx: rand(-30, 30), dy: rand(-25, 25), r: rand(14, 34) });
  return { x: rand(40, W - 40), y, blobs, spd: 1.1 };
}
function newCloud(y) {
  return { x: rand(0, W), y, w: rand(90, 200), spd: rand(1.8, 2.6), a: rand(.12, .28) };
}

// ---- 입력 ----
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key.toLowerCase() === 'b') useBomb();
  if ([' ','arrowup','arrowdown','arrowleft','arrowright'].includes(e.key.toLowerCase())) e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// 터치 드래그: 손가락 이동량만큼 기체 이동 (손가락이 기체를 가리지 않게)
let touch = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  touch = { id: t.identifier, x: t.clientX, y: t.clientY };
}, { passive:false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touch || state !== S.PLAY) return;
  for (const t of e.changedTouches) {
    if (t.identifier === touch.id) {
      const dx = (t.clientX - touch.x) / scale;
      const dy = (t.clientY - touch.y) / scale;
      player.x = clamp(player.x + dx * 1.15, 16, W - 16);
      player.y = clamp(player.y + dy * 1.15, 40, H - 30);
      touch.x = t.clientX; touch.y = t.clientY;
    }
  }
}, { passive:false });
canvas.addEventListener('touchend', e => { touch = null; }, { passive:false });

// ---- 폭탄 ----
function useBomb() {
  if (state !== S.PLAY || !player.alive || player.bombs <= 0) return;
  player.bombs--;
  shake = 24;
  eBullets.length = 0;
  for (const en of enemies) {
    en.hp -= 30;
    boom(en.x, en.y, 8, '#ffd166');
  }
  if (boss) { boss.hp -= 60; boom(boss.x, boss.y, 20, '#ff5d8f'); }
  // 화면 전체 섬광
  particles.push({ type:'flash', life: 14, max: 14 });
  updateBombUI();
}
function updateBombUI() {
  document.getElementById('bombBtnCnt').textContent = player ? player.bombs : 3;
}
document.getElementById('bombBtn').addEventListener('touchstart', e => { e.preventDefault(); useBomb(); }, { passive:false });
document.getElementById('bombBtn').addEventListener('click', e => useBomb());

// ---- 적 생성 (웨이브 패턴) ----
function spawnWave() {
  wave++;
  if (wave % 8 === 0) { spawnBoss(); return; }
  const theme = (stage - 1) % 4;
  // 지역별 특수 적 가중치: 바다=함선, 정글=헬기, 사막=드론+헬기, 야간도시=드론
  const pool = [0, 1, 2, 3, 4];
  if (theme === 0) pool.push(5, 5, 8);
  else if (theme === 1) pool.push(6, 6);
  else if (theme === 2) pool.push(7, 6);
  else pool.push(7, 7);
  const pattern = pool[Math.floor(rand(0, pool.length))];
  const n = 4 + Math.min(6, Math.floor(wave / 2));
  if (pattern === 0) { // V자 편대
    for (let i = 0; i < n; i++) {
      const off = (i - (n-1)/2);
      spawnEnemy('zako', W/2 + off * 42, -30 - Math.abs(off) * 34, { vx: 0, vy: 2.4 });
    }
  } else if (pattern === 1) { // 좌우 사인 곡선
    const side = Math.random() < .5 ? 1 : -1;
    for (let i = 0; i < n; i++) {
      spawnEnemy('sine', side > 0 ? -30 - i * 44 : W + 30 + i * 44, 70 + rand(-10, 10),
        { vx: 2.2 * side, vy: 0.6, phase: i * .7 });
    }
  } else if (pattern === 2) { // 급강하 편대
    for (let i = 0; i < n; i++) {
      spawnEnemy('diver', rand(30, W-30), -30 - i * 50, { vx: 0, vy: 3.6 });
    }
  } else if (pattern === 3) { // 중형기 + 호위
    spawnEnemy('mid', rand(80, W-80), -50, { vx: rand(-.6,.6), vy: 1.2 });
    for (let i = 0; i < 3; i++) spawnEnemy('zako', rand(30, W-30), -30 - i*40, { vx: 0, vy: 2.2 });
  } else if (pattern === 4) { // 회전 진입
    for (let i = 0; i < n; i++) {
      spawnEnemy('spinner', W/2, -30 - i * 40, { angle: i * .9, vy: 1.8 });
    }
  } else if (pattern === 5) { // 함선 편대 + 호위기
    const k = 2 + (Math.random() < .5 ? 1 : 0);
    for (let i = 0; i < k; i++)
      spawnEnemy('ship', 60 + (i + .5) * (W - 120) / k + rand(-20, 20), -40 - i * 70, { vx: 0, vy: 1.5 });
    for (let i = 0; i < 2; i++) spawnEnemy('zako', rand(30, W-30), -30 - i * 45, { vx: 0, vy: 2.3 });
  } else if (pattern === 6) { // 헬기 측면 진입
    spawnEnemy('heli', -30, rand(90, 150), { vx: 2.0, vy: 0 });
    spawnEnemy('heli', W + 30, rand(180, 250), { vx: -2.0, vy: 0 });
    if (wave > 10) spawnEnemy('heli', -30, rand(260, 320), { vx: 2.2, vy: 0 });
  } else if (pattern === 8) { // 항공모함 전단 (모함 + 호위함)
    spawnEnemy('carrier', rand(100, W - 100), -70, { vx: rand(-.3, .3), vy: 0.9 });
    spawnEnemy('ship', rand(40, W - 40), -180, { vx: 0, vy: 1.4 });
  } else { // 드론 스웜
    const k = 6 + Math.floor(rand(0, 3));
    for (let i = 0; i < k; i++)
      spawnEnemy('drone', rand(30, W-30), -20 - i * 34, { vy: rand(1.8, 2.6), phase: rand(0, 6.28) });
  }
}

function spawnEnemy(type, x, y, opt) {
  const base = {
    zako:    { hp: 2,  r: 13, score: 100, shoot: 130 },
    sine:    { hp: 2,  r: 13, score: 120, shoot: 120 },
    diver:   { hp: 1,  r: 12, score: 80,  shoot: 999999 },
    mid:     { hp: 14, r: 22, score: 500, shoot: 70 },
    spinner: { hp: 3,  r: 13, score: 150, shoot: 140 },
    drone:   { hp: 2,  r: 11, score: 150, shoot: 100 },
    ship:    { hp: 10, r: 20, score: 400, shoot: 90 },
    heli:    { hp: 4,  r: 15, score: 250, shoot: 80 },
    carrier: { hp: 35, r: 34, score: 1500, shoot: 110 }
  }[type];
  enemies.push({
    type, x, y, ...opt,
    hp: base.hp, r: base.r, score: base.score,
    shootEvery: base.shoot, t: Math.floor(rand(0, 60))
  });
}

let bossCount = 0;
function spawnBoss() {
  const kind = bossCount % 4;
  bossCount++;
  boss = {
    x: W/2, y: -80, r: 52, kind,
    hp: 300 + wave * 25, maxHp: 300 + wave * 25,
    t: 0, phase: 0, dir: 1
  };
}

// ---- 발사 ----
function playerShoot() {
  const p = player;
  if (p.cool > 0) { p.cool--; return; }
  p.cool = 7;
  const spd = -9.5;
  const pw = p.power;
  if (pw === 1) {
    bullets.push({ x:p.x, y:p.y-14, vx:0, vy:spd, dmg:1 });
  } else if (pw === 2) {
    bullets.push({ x:p.x-7, y:p.y-12, vx:0, vy:spd, dmg:1 });
    bullets.push({ x:p.x+7, y:p.y-12, vx:0, vy:spd, dmg:1 });
  } else if (pw === 3) {
    bullets.push({ x:p.x-8, y:p.y-10, vx:-1.1, vy:spd, dmg:1 });
    bullets.push({ x:p.x,   y:p.y-16, vx:0,    vy:spd, dmg:1 });
    bullets.push({ x:p.x+8, y:p.y-10, vx:1.1,  vy:spd, dmg:1 });
  } else {
    bullets.push({ x:p.x-14, y:p.y-6,  vx:-2.2, vy:spd, dmg:1 });
    bullets.push({ x:p.x-7,  y:p.y-12, vx:-.9,  vy:spd, dmg:1 });
    bullets.push({ x:p.x,    y:p.y-16, vx:0,    vy:spd, dmg:1 });
    bullets.push({ x:p.x+7,  y:p.y-12, vx:.9,   vy:spd, dmg:1 });
    bullets.push({ x:p.x+14, y:p.y-6,  vx:2.2,  vy:spd, dmg:1 });
  }
  // 5단계+: 좌우 옵션 포드에서 관통 레이저
  if (pw >= 5) {
    bullets.push({ x:p.x-24, y:p.y-4, vx:0, vy:-16, dmg:1.2, laser:true, hits:new WeakSet() });
    bullets.push({ x:p.x+24, y:p.y-4, vx:0, vy:-16, dmg:1.2, laser:true, hits:new WeakSet() });
  }
  // 6단계+: 사선 레이저 추가
  if (pw >= 6) {
    bullets.push({ x:p.x-24, y:p.y-4, vx:-1.8, vy:-15, dmg:1.2, laser:true, hits:new WeakSet() });
    bullets.push({ x:p.x+24, y:p.y-4, vx:1.8,  vy:-15, dmg:1.2, laser:true, hits:new WeakSet() });
  }
}

function aimShot(x, y, spd, spread = 0) {
  if (!player.alive) return;
  const ang = Math.atan2(player.y - y, player.x - x) + spread;
  eBullets.push({ x, y, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, r: 4 });
}

// ---- 파티클 ----
function boom(x, y, n, color) {
  for (let i = 0; i < n; i++) {
    const a = rand(0, Math.PI*2), s = rand(.5, 4);
    particles.push({ type:'p', x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life: rand(18, 40), max:40, color });
  }
  particles.push({ type:'ring', x, y, life: 16, max: 16, color });
}

// ---- 파워업 ----
function dropPowerup(x, y) {
  const roll = Math.random();
  let kind;
  if (roll < .55) kind = 'P';
  else kind = 'B';
  powerups.push({ x, y, vy: 1.6, kind, t: 0, r: 12 });
}

// ---- 업데이트 ----
function update() {
  frame++;

  // 배경
  for (const c of clouds) { c.y += c.spd; if (c.y > H + 60) { Object.assign(c, newCloud(-80)); } }
  for (const is of islands) { is.y += is.spd; if (is.y > H + 80) { Object.assign(is, newIsland(-100)); } }

  if (state !== S.PLAY) return;

  // 플레이어
  const p = player;
  if (p.alive) {
    let dx = 0, dy = 0;
    if (keys['arrowleft'] || keys['a']) dx -= 1;
    if (keys['arrowright'] || keys['d']) dx += 1;
    if (keys['arrowup'] || keys['w']) dy -= 1;
    if (keys['arrowdown'] || keys['s']) dy += 1;
    if (dx && dy) { dx *= .707; dy *= .707; }
    p.x = clamp(p.x + dx * p.speed, 16, W - 16);
    p.y = clamp(p.y + dy * p.speed, 40, H - 30);
    if (p.inv > 0) p.inv--;
    playerShoot();
    // 엔진 트레일
    if (frame % 3 === 0) particles.push({ type:'p', x:p.x + rand(-3,3), y:p.y+16, vx:0, vy:2.5, life:14, max:14, color:'#8ecae6' });
  } else {
    p.respawn--;
    if (p.respawn <= 0) {
      p.alive = true; p.inv = 120; p.x = W/2; p.y = H - 90; p.power = Math.max(1, p.power - 1);
    }
  }

  // 웨이브 스폰
  if (!boss && enemies.length === 0 && frame % 30 === 0) spawnWave();

  // 적 이동/사격
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.t++;
    if (e.type === 'zako' || e.type === 'diver') { e.x += e.vx; e.y += e.vy; }
    else if (e.type === 'sine') { e.x += e.vx; e.y += e.vy + Math.sin(e.t * .06 + e.phase) * 1.4; }
    else if (e.type === 'mid') {
      e.x += e.vx; e.y += e.vy;
      if (e.y > 130) e.vy *= .96;
      if (e.x < 40 || e.x > W - 40) e.vx *= -1;
    }
    else if (e.type === 'spinner') {
      e.angle += .05;
      e.x = W/2 + Math.sin(e.angle) * (W/2 - 50);
      e.y += e.vy;
    }
    else if (e.type === 'drone') { // 지그재그 강하
      e.x += Math.sin(e.t * .09 + e.phase) * 2.4;
      e.y += e.vy;
    }
    else if (e.type === 'ship') { // 항적을 남기며 직진
      e.y += e.vy;
      if (frame % 5 === 0) particles.push({ type:'p', x:e.x + rand(-6,6), y:e.y - 26, vx:0, vy:-1.1, life:16, max:16, color:'#e0f4ff' });
    }
    else if (e.type === 'heli') { // 좌우 왕복 + 서서히 하강
      e.x += e.vx;
      if ((e.x < 40 && e.vx < 0) || (e.x > W - 40 && e.vx > 0)) e.vx *= -1;
      e.y += .25 + Math.sin(e.t * .07) * .6;
    }
    else if (e.type === 'carrier') { // 항공모함: 저속 전진 + 함재기 발진
      e.x += e.vx; e.y += e.vy;
      if ((e.x < 70 && e.vx < 0) || (e.x > W - 70 && e.vx > 0)) e.vx *= -1;
      if (frame % 4 === 0) {
        particles.push({ type:'p', x:e.x - 13 + rand(-3,3), y:e.y - 52, vx:0, vy:-1.0, life:18, max:18, color:'#e0f4ff' });
        particles.push({ type:'p', x:e.x + 13 + rand(-3,3), y:e.y - 52, vx:0, vy:-1.0, life:18, max:18, color:'#e0f4ff' });
      }
      if (e.t % 130 === 0 && e.y > -10 && e.y < H - 220) {
        spawnEnemy('zako', e.x, e.y + 34, { vx: rand(-.4, .4), vy: 2.4 });
        for (let k = 0; k < 4; k++)
          particles.push({ type:'p', x:e.x + rand(-6,6), y:e.y + 30, vx:rand(-.8,.8), vy:1.5, life:14, max:14, color:'#ffd166' });
      }
    }
    // 사격
    if (e.t % e.shootEvery === 0 && e.y > 0 && e.y < H - 160) {
      if (e.type === 'carrier') { for (let k = -2; k <= 2; k++) aimShot(e.x, e.y + 20, 3.0, k * .22); }
      else if (e.type === 'mid' || e.type === 'ship') { aimShot(e.x, e.y, 3.2, -.25); aimShot(e.x, e.y, 3.2, 0); aimShot(e.x, e.y, 3.2, .25); }
      else if (e.type === 'heli') { aimShot(e.x, e.y, 3.6, -.1); aimShot(e.x, e.y, 3.6, .1); }
      else aimShot(e.x, e.y, 3.4);
    }
    if (e.y > H + (e.type === 'carrier' ? 110 : 40) || e.x < -70 || e.x > W + 70 || e.t > 3600) enemies.splice(i, 1);
  }

  // 보스
  if (boss) {
    const b = boss;
    b.t++;
    if (b.y < 110) b.y += 1.4;
    else {
      b.x += b.dir * 1.5;
      if (b.x < 80 || b.x > W - 80) b.dir *= -1;
      // 패턴 사격 (타입별)
      if (b.kind === 0) { // 폭격기: 부채꼴 + 원형탄
        if (b.t % 50 === 0) for (let k = -3; k <= 3; k++) aimShot(b.x, b.y + 30, 3.0, k * .18);
        if (b.t % 90 === 0) for (let k = 0; k < 12; k++) {
          const a = (k / 12) * Math.PI * 2 + b.t * .01;
          eBullets.push({ x:b.x, y:b.y, vx:Math.cos(a)*2.4, vy:Math.sin(a)*2.4, r:4 });
        }
      } else if (b.kind === 1) { // 쌍발 중폭격기: 양 날개 조준 연사
        if (b.t % 34 === 0) { aimShot(b.x - 48, b.y + 20, 3.4); aimShot(b.x + 48, b.y + 20, 3.4); }
        if (b.t % 100 === 0) for (let k = -2; k <= 2; k++) aimShot(b.x, b.y + 34, 2.6, k * .3);
      } else if (b.kind === 2) { // 전익기: 회전 나선탄
        if (b.t % 7 === 0) {
          const a = b.t * .17;
          eBullets.push({ x:b.x, y:b.y+10, vx:Math.cos(a)*2.6, vy:Math.abs(Math.sin(a))*2.6+.8, r:4 });
          eBullets.push({ x:b.x, y:b.y+10, vx:-Math.cos(a)*2.6, vy:Math.abs(Math.sin(a))*2.6+.8, r:4 });
        }
      } else { // 건쉽: 탄벽 + 조준탄
        if (b.t % 80 === 0) for (let k = 0; k < 9; k++) {
          eBullets.push({ x: 30 + k * (W-60)/8 + rand(-8,8), y: b.y + 30, vx: 0, vy: 2.6, r: 4 });
        }
        if (b.t % 46 === 0) aimShot(b.x, b.y + 30, 3.6);
      }
    }
    if (b.hp <= 0) {
      score += 5000 + wave * 200;
      for (let k = 0; k < 6; k++)
        setTimeout(() => boom(b.x + rand(-40,40), b.y + rand(-30,30), 14, '#ffd166'), k * 90);
      boom(b.x, b.y, 30, '#ff5d8f');
      dropPowerup(b.x - 30, b.y); dropPowerup(b.x, b.y + 20); dropPowerup(b.x + 30, b.y);
      shake = 30;
      boss = null;
      stage++;
      banner = { text: 'STAGE ' + stage + ' — ' + THEMES[(stage - 1) % 4].name, life: 140 };
    }
  }

  // 아군 탄
  for (let i = bullets.length - 1; i >= 0; i--) {
    const bl = bullets[i];
    bl.x += bl.vx; bl.y += bl.vy;
    if (bl.y < -30 || bl.x < -30 || bl.x > W + 30) { bullets.splice(i, 1); continue; }
    let consumed = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (bl.laser && bl.hits.has(e)) continue;
      if (dist2(bl, e) < (e.r + 4) ** 2) {
        e.hp -= bl.dmg;
        particles.push({ type:'p', x:bl.x, y:bl.y, vx:rand(-1,1), vy:-1, life:10, max:10, color: bl.laser ? '#80ffdb' : '#fff' });
        if (e.hp <= 0) {
          score += e.score;
          boom(e.x, e.y, e.type === 'mid' ? 16 : 8, '#ff9e40');
          if (e.type === 'carrier') { dropPowerup(e.x - 20, e.y); dropPowerup(e.x + 20, e.y); }
          else if (e.type === 'mid' || e.type === 'ship' || Math.random() < .3) dropPowerup(e.x, e.y);
          enemies.splice(j, 1);
        } else if (bl.laser) {
          bl.hits.add(e);
        }
        if (!bl.laser) { consumed = true; break; }
      }
    }
    if (!consumed && boss && dist2(bl, boss) < (boss.r + 4) ** 2 && !(bl.laser && bl.hits.has(boss))) {
      boss.hp -= bl.dmg;
      particles.push({ type:'p', x:bl.x, y:bl.y, vx:rand(-1,1), vy:-1, life:10, max:10, color: bl.laser ? '#80ffdb' : '#fff' });
      if (bl.laser) bl.hits.add(boss); else consumed = true;
    }
    if (consumed) bullets.splice(i, 1);
  }

  // 7단계(MAX): 중앙 관통 빔 — 기체 정면 일직선상의 적을 지속 타격
  if (p.alive && p.power >= 7) {
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (e.y < p.y && Math.abs(e.x - p.x) < e.r + 8) {
        e.hp -= 0.28;
        if (frame % 5 === 0) particles.push({ type:'p', x:p.x + rand(-4,4), y:e.y, vx:rand(-1.5,1.5), vy:rand(-1,0), life:10, max:10, color:'#d0fff2' });
        if (e.hp <= 0) {
          score += e.score;
          boom(e.x, e.y, e.type === 'mid' ? 16 : 8, '#ff9e40');
          if (e.type === 'carrier') { dropPowerup(e.x - 20, e.y); dropPowerup(e.x + 20, e.y); }
          else if (e.type === 'mid' || e.type === 'ship' || Math.random() < .3) dropPowerup(e.x, e.y);
          enemies.splice(j, 1);
        }
      }
    }
    if (boss && boss.y < p.y && Math.abs(boss.x - p.x) < boss.r + 8) {
      boss.hp -= 0.34;
      if (frame % 5 === 0) particles.push({ type:'p', x:p.x + rand(-4,4), y:boss.y + boss.r * .6, vx:rand(-1.5,1.5), vy:rand(-1,0), life:10, max:10, color:'#d0fff2' });
    }
  }

  // 적탄 & 충돌
  for (let i = eBullets.length - 1; i >= 0; i--) {
    const b = eBullets[i];
    b.x += b.vx; b.y += b.vy;
    if (b.y > H + 20 || b.y < -20 || b.x < -20 || b.x > W + 20) { eBullets.splice(i, 1); continue; }
    if (p.alive && p.inv <= 0 && dist2(b, p) < (p.r * .55 + b.r) ** 2) {
      eBullets.splice(i, 1);
      killPlayer();
    }
  }
  // 몸통 충돌
  if (p.alive && p.inv <= 0) {
    for (const e of enemies) {
      if (dist2(e, p) < (e.r * .8 + p.r * .6) ** 2) { killPlayer(); break; }
    }
    if (p.alive && boss && dist2(boss, p) < (boss.r * .8 + p.r * .6) ** 2) killPlayer();
  }

  // 파워업
  for (let i = powerups.length - 1; i >= 0; i--) {
    const pu = powerups[i];
    pu.t++;
    pu.y += pu.vy;
    pu.x += Math.sin(pu.t * .05) * .8;
    if (pu.y > H + 20) { powerups.splice(i, 1); continue; }
    if (p.alive && dist2(pu, p) < (pu.r + p.r) ** 2) {
      if (pu.kind === 'P') { p.power = Math.min(7, p.power + 1); score += 200; }
      else if (pu.kind === 'B') { p.bombs = Math.min(9, p.bombs + 1); updateBombUI(); }
      else { p.lives = Math.min(5, p.lives + 1); }
      boom(pu.x, pu.y, 6, '#80ffdb');
      powerups.splice(i, 1);
    }
  }

  // 파티클
  for (let i = particles.length - 1; i >= 0; i--) {
    const pt = particles[i];
    pt.life--;
    if (pt.type === 'p') { pt.x += pt.vx; pt.y += pt.vy; pt.vy += .04; }
    if (pt.life <= 0) particles.splice(i, 1);
  }

  if (shake > 0) shake--;
}

function killPlayer() {
  const p = player;
  boom(p.x, p.y, 22, '#ff5d8f');
  shake = 20;
  p.alive = false;
  p.respawn = 70;
}

function endGame() {
  state = S.OVER;
  best = Math.max(best, score);
  document.getElementById('finalScore').textContent = 'SCORE ' + score.toLocaleString();
  document.getElementById('bestScore').textContent = 'BEST ' + best.toLocaleString();
  document.getElementById('overPanel').classList.remove('hidden');
  document.getElementById('bombBtn').style.display = 'none';
}

// ---- 그리기 ----
function drawPlane(x, y, color, size, up = true) {
  ctx.save();
  ctx.translate(x, y);
  if (!up) ctx.rotate(Math.PI);
  const s = size;
  // 동체
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, -s * 1.3);
  ctx.lineTo(s * .28, -s * .2);
  ctx.lineTo(s * .28, s * .8);
  ctx.lineTo(-s * .28, s * .8);
  ctx.lineTo(-s * .28, -s * .2);
  ctx.closePath();
  ctx.fill();
  // 주익
  ctx.beginPath();
  ctx.moveTo(0, -s * .3);
  ctx.lineTo(s * 1.15, s * .35);
  ctx.lineTo(s * 1.15, s * .55);
  ctx.lineTo(-s * 1.15, s * .55);
  ctx.lineTo(-s * 1.15, s * .35);
  ctx.closePath();
  ctx.fill();
  // 꼬리
  ctx.fillRect(-s * .55, s * .62, s * 1.1, s * .22);
  // 캐노피
  ctx.fillStyle = 'rgba(180,230,255,.9)';
  ctx.fillRect(-s * .12, -s * .55, s * .24, s * .5);
  ctx.restore();
}

function drawDrone(e) {
  ctx.save(); ctx.translate(e.x, e.y);
  // X자 프레임
  ctx.strokeStyle = '#343a40'; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-8, -8); ctx.lineTo(8, 8); ctx.moveTo(8, -8); ctx.lineTo(-8, 8);
  ctx.stroke();
  ctx.fillStyle = '#495057';
  ctx.fillRect(-6, -6, 12, 12);
  // 4개 로터 (반투명 회전 느낌)
  ctx.globalAlpha = .5;
  ctx.strokeStyle = '#adb5bd'; ctx.lineWidth = 2;
  for (const c of [[-9,-9],[9,-9],[-9,9],[9,9]]) {
    ctx.beginPath(); ctx.arc(c[0], c[1], 5, 0, Math.PI*2); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  // 경고등 점멸
  ctx.fillStyle = Math.floor(e.t / 8) % 2 === 0 ? '#ff5d8f' : '#800f2f';
  ctx.beginPath(); ctx.arc(0, 0, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawShip(e) {
  ctx.save(); ctx.translate(e.x, e.y);
  // 선체 (뱃머리가 진행 방향인 아래쪽)
  ctx.fillStyle = '#5c677d';
  ctx.beginPath();
  ctx.moveTo(0, 28); ctx.lineTo(10, 12); ctx.lineTo(10, -24); ctx.lineTo(-10, -24); ctx.lineTo(-10, 12);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#7d8597';
  ctx.fillRect(-6, -18, 12, 26); // 갑판
  // 회전 포탑 (플레이어 조준)
  ctx.fillStyle = '#33415c';
  ctx.beginPath(); ctx.arc(0, 2, 6, 0, Math.PI*2); ctx.fill();
  const a = (player && player.alive) ? Math.atan2(player.y - e.y, player.x - e.x) : Math.PI / 2;
  ctx.strokeStyle = '#33415c'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(0, 2); ctx.lineTo(Math.cos(a) * 14, 2 + Math.sin(a) * 14); ctx.stroke();
  ctx.restore();
}

function drawHeli(e) {
  ctx.save(); ctx.translate(e.x, e.y);
  const d = e.vx >= 0 ? 1 : -1; // 진행 방향
  // 동체
  ctx.fillStyle = '#606c38';
  ctx.beginPath(); ctx.ellipse(0, 0, 12, 8, 0, 0, Math.PI*2); ctx.fill();
  // 꼬리붐 + 테일로터
  ctx.fillRect(d > 0 ? -26 : 8, -2, 18, 4);
  ctx.fillStyle = '#283618';
  ctx.beginPath(); ctx.arc(-d * 26, 0, 4, 0, Math.PI*2); ctx.fill();
  // 조종석 창
  ctx.fillStyle = 'rgba(180,230,255,.9)';
  ctx.fillRect(d > 0 ? 4 : -9, -3, 5, 5);
  // 메인 로터 (회전)
  ctx.strokeStyle = 'rgba(225,225,225,.8)'; ctx.lineWidth = 2;
  const ra = e.t * .6;
  ctx.beginPath();
  ctx.moveTo(Math.cos(ra) * 18, -7 + Math.sin(ra) * 4);
  ctx.lineTo(-Math.cos(ra) * 18, -7 - Math.sin(ra) * 4);
  ctx.stroke();
  ctx.restore();
}

function drawCarrier(e) {
  ctx.save(); ctx.translate(e.x, e.y);
  // 선체 (뱃머리 아래쪽)
  ctx.fillStyle = '#3d4a5c';
  ctx.beginPath();
  ctx.moveTo(0, 56); ctx.lineTo(19, 40); ctx.lineTo(21, -48); ctx.lineTo(-21, -48); ctx.lineTo(-19, 40);
  ctx.closePath(); ctx.fill();
  // 비행갑판
  ctx.fillStyle = '#5c6b80';
  ctx.fillRect(-17, -46, 34, 90);
  // 활주로 중앙선 (점선)
  ctx.fillStyle = 'rgba(255,255,255,.7)';
  for (let y = -40; y < 40; y += 12) ctx.fillRect(-1.5, y, 3, 6);
  // 갑판 경계선
  ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 1;
  ctx.strokeRect(-17, -46, 34, 90);
  // 관제탑 (아일랜드)
  ctx.fillStyle = '#2d3748';
  ctx.fillRect(8, -14, 10, 24);
  ctx.fillStyle = '#1a202c';
  ctx.fillRect(10, -20, 6, 7);
  // 관제탑 경고등 점멸
  ctx.fillStyle = Math.floor(e.t / 10) % 2 === 0 ? '#ff5d8f' : '#5c2036';
  ctx.beginPath(); ctx.arc(13, -22, 2, 0, Math.PI*2); ctx.fill();
  // 대기 중인 함재기 (좌측 갑판)
  ctx.fillStyle = '#8a99ad';
  for (const py of [-30, -12]) {
    ctx.beginPath();
    ctx.moveTo(-9, py + 6); ctx.lineTo(-5, py - 4); ctx.lineTo(-13, py - 4);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawBoss(b) {
  const t = b.t;
  ctx.save();
  ctx.translate(b.x, b.y);
  if (b.kind === 0) {
    // 편대 폭격기 (회색 3기 편대)
    ctx.restore();
    drawPlane(b.x, b.y, '#495057', 46, false);
    drawPlane(b.x - 34, b.y + 8, '#6c757d', 18, false);
    drawPlane(b.x + 34, b.y + 8, '#6c757d', 18, false);
    return;
  }
  if (b.kind === 1) {
    // 쌍발 중폭격기 (붉은 동체 2개 + 대형 주익)
    ctx.fillStyle = '#9d2b2b';
    ctx.beginPath(); // 주익
    ctx.moveTo(0, -30); ctx.lineTo(72, 14); ctx.lineTo(72, 26); ctx.lineTo(-72, 26); ctx.lineTo(-72, 14);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#c1440e';
    ctx.fillRect(-52, -34, 16, 70); // 좌 동체
    ctx.fillRect(36, -34, 16, 70);  // 우 동체
    ctx.fillRect(-8, -44, 16, 62);  // 중앙 동체
    ctx.fillStyle = '#ffd166';      // 프로펠러 깜빡임
    if (Math.floor(t/3) % 2 === 0) { ctx.fillRect(-56, 36, 24, 3); ctx.fillRect(32, 36, 24, 3); }
    ctx.fillStyle = 'rgba(180,230,255,.9)';
    ctx.fillRect(-4, 8, 8, 14);
  } else if (b.kind === 2) {
    // 전익기 (스텔스형 삼각 날개, 보라)
    ctx.fillStyle = '#3d2b56';
    ctx.beginPath();
    ctx.moveTo(0, 44); ctx.lineTo(78, -26); ctx.lineTo(40, -34); ctx.lineTo(0, -18);
    ctx.lineTo(-40, -34); ctx.lineTo(-78, -26);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#6a4c93';
    ctx.beginPath();
    ctx.moveTo(0, 30); ctx.lineTo(30, -14); ctx.lineTo(-30, -14);
    ctx.closePath(); ctx.fill();
    // 엔진 발광
    ctx.fillStyle = Math.floor(t/4) % 2 === 0 ? '#ff5d8f' : '#ffd166';
    ctx.fillRect(-22, -28, 8, 6); ctx.fillRect(14, -28, 8, 6);
    ctx.fillStyle = 'rgba(180,230,255,.9)';
    ctx.beginPath(); ctx.arc(0, 12, 6, 0, Math.PI*2); ctx.fill();
  } else {
    // 건쉽 (육각 장갑 + 회전 포탑, 군록색)
    ctx.fillStyle = '#3a5a40';
    ctx.beginPath();
    ctx.moveTo(0, -50); ctx.lineTo(44, -22); ctx.lineTo(44, 26); ctx.lineTo(0, 52);
    ctx.lineTo(-44, 26); ctx.lineTo(-44, -22);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#a3b18a'; ctx.lineWidth = 3; ctx.stroke();
    ctx.fillStyle = '#588157'; // 측면 포드
    ctx.fillRect(-64, -12, 20, 34); ctx.fillRect(44, -12, 20, 34);
    // 회전 포탑
    ctx.save();
    ctx.rotate(t * .04);
    ctx.fillStyle = '#344e41';
    ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffd166';
    ctx.fillRect(-3, 0, 6, 26);
    ctx.restore();
  }
  ctx.restore();
}

function draw() {
  ctx.save();
  if (shake > 0) ctx.translate(rand(-shake/3, shake/3), rand(-shake/3, shake/3));

  // 배경 (스테이지 테마)
  const th = THEMES[(stage - 1) % 4];
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, th.top);
  g.addColorStop(1, th.bot);
  ctx.fillStyle = g;
  ctx.fillRect(-10, -10, W + 20, H + 20);

  // 물결/지형 라인
  ctx.strokeStyle = th.wave;
  ctx.lineWidth = 2;
  for (let i = 0; i < 9; i++) {
    const yy = ((frame * 1.1 + i * 90) % (H + 90)) - 45;
    ctx.beginPath();
    for (let x = 0; x <= W; x += 20) {
      const y2 = yy + Math.sin((x + frame) * .03 + i) * 5;
      x === 0 ? ctx.moveTo(x, y2) : ctx.lineTo(x, y2);
    }
    ctx.stroke();
  }

  // 지형 오브젝트 (섬/숲/바위/빌딩)
  for (const is of islands) {
    if (th.city) {
      for (const b of is.blobs) {
        const bw = b.r * 1.2, bh = b.r * 2.2;
        ctx.fillStyle = '#1a1033';
        ctx.fillRect(is.x + b.dx - bw/2, is.y + b.dy - bh/2, bw, bh);
        ctx.fillStyle = 'rgba(255,209,102,.55)';
        for (let wy = 0; wy < 3; wy++) for (let wx = 0; wx < 2; wx++) {
          if ((Math.floor(b.r) + wx + wy * 2) % 3 !== 0)
            ctx.fillRect(is.x + b.dx - bw/2 + 4 + wx * bw * .45, is.y + b.dy - bh/2 + 5 + wy * bh * .3, 4, 5);
        }
      }
    } else {
      for (const b of is.blobs) {
        ctx.fillStyle = th.land;
        ctx.beginPath(); ctx.arc(is.x + b.dx, is.y + b.dy, b.r, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = th.edge;
        ctx.beginPath(); ctx.arc(is.x + b.dx, is.y + b.dy, b.r + 3, 0, Math.PI*2); ctx.globalCompositeOperation = 'destination-over'; ctx.fill();
        ctx.globalCompositeOperation = 'source-over';
      }
    }
  }

  // 파워업
  for (const pu of powerups) {
    const pulse = 1 + Math.sin(pu.t * .15) * .12;
    ctx.save();
    ctx.translate(pu.x, pu.y);
    ctx.scale(pulse, pulse);
    ctx.fillStyle = pu.kind === 'P' ? '#ffd166' : pu.kind === 'B' ? '#ff5d8f' : '#80ffdb';
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.rect(-11, -11, 22, 22);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#0a0e1a';
    ctx.font = 'bold 14px Courier New';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(pu.kind === 'L' ? '♥' : pu.kind, 0, 1);
    ctx.restore();
  }

  // 적
  for (const e of enemies) {
    if (e.type === 'drone') drawDrone(e);
    else if (e.type === 'ship') drawShip(e);
    else if (e.type === 'heli') drawHeli(e);
    else if (e.type === 'carrier') drawCarrier(e);
    else {
      const col = e.type === 'mid' ? '#adb5bd' : e.type === 'diver' ? '#e07a5f' : '#6c757d';
      drawPlane(e.x, e.y, col, e.type === 'mid' ? 20 : 12, false);
    }
  }

  // 보스
  if (boss) {
    const b = boss;
    drawBoss(b);
    // HP바
    ctx.fillStyle = 'rgba(0,0,0,.5)';
    ctx.fillRect(30, 14, W - 60, 8);
    ctx.fillStyle = '#ff5d8f';
    ctx.fillRect(30, 14, (W - 60) * clamp(b.hp / b.maxHp, 0, 1), 8);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
    ctx.strokeRect(30, 14, W - 60, 8);
  }

  // 아군 탄
  for (const b of bullets) {
    if (b.laser) {
      ctx.fillStyle = 'rgba(128,255,219,.45)';
      ctx.fillRect(b.x - 3.5, b.y - 18, 7, 30);
      ctx.fillStyle = '#d0fff2';
      ctx.fillRect(b.x - 1.5, b.y - 18, 3, 30);
    } else {
      ctx.fillStyle = '#ffe14d';
      ctx.fillRect(b.x - 2, b.y - 7, 4, 12);
    }
  }

  // 적탄
  for (const b of eBullets) {
    ctx.fillStyle = '#ff5d8f';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffd7e5';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r * .45, 0, Math.PI*2); ctx.fill();
  }

  // 플레이어
  if (state === S.PLAY && player.alive) {
    // 7단계: 중앙 관통 빔
    if (player.power >= 7) {
      const flick = 1 + Math.sin(frame * .5) * .25;
      ctx.fillStyle = 'rgba(128,255,219,.16)';
      ctx.fillRect(player.x - 11 * flick, 0, 22 * flick, player.y - 14);
      ctx.fillStyle = 'rgba(128,255,219,.35)';
      ctx.fillRect(player.x - 5 * flick, 0, 10 * flick, player.y - 14);
      ctx.fillStyle = 'rgba(255,255,255,.85)';
      ctx.fillRect(player.x - 2, 0, 4, player.y - 14);
    }
    if (player.inv <= 0 || Math.floor(frame / 4) % 2 === 0) {
      drawPlane(player.x, player.y, '#43aa8b', 15, true);
      // 옵션 포드 (5단계+)
      if (player.power >= 5) {
        for (const side of [-1, 1]) {
          const ox = player.x + side * 24, oy = player.y - 2 + Math.sin(frame * .12 + side) * 2;
          ctx.fillStyle = '#256d5c';
          ctx.beginPath(); ctx.arc(ox, oy, 6, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = Math.floor(frame / 5) % 2 === 0 ? '#80ffdb' : '#d0fff2';
          ctx.beginPath(); ctx.arc(ox, oy, 2.8, 0, Math.PI*2); ctx.fill();
        }
      }
      // 히트박스 코어 표시
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(player.x, player.y, 2.5, 0, Math.PI*2); ctx.fill();
    }
  }

  // 파티클
  for (const pt of particles) {
    const a = pt.life / pt.max;
    if (pt.type === 'p') {
      ctx.globalAlpha = a;
      ctx.fillStyle = pt.color;
      ctx.fillRect(pt.x - 2, pt.y - 2, 4, 4);
      ctx.globalAlpha = 1;
    } else if (pt.type === 'ring') {
      ctx.globalAlpha = a * .8;
      ctx.strokeStyle = pt.color;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, (1 - a) * 34 + 6, 0, Math.PI*2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    } else if (pt.type === 'flash') {
      ctx.globalAlpha = a * .55;
      ctx.fillStyle = '#fff';
      ctx.fillRect(-10, -10, W + 20, H + 20);
      ctx.globalAlpha = 1;
    }
  }

  ctx.restore();

  // HUD
  if (state === S.PLAY) {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px Courier New';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('SCORE ' + score.toLocaleString(), 10, boss ? 28 : 10);
    ctx.textAlign = 'right';
    ctx.fillText('♥∞', W - 10, boss ? 28 : 10);
    ctx.fillStyle = '#ffd166';
    ctx.fillText('B×' + player.bombs, W - 10, boss ? 48 : 30);
    ctx.fillStyle = '#8ecae6';
    ctx.textAlign = 'left';
    ctx.fillText('WAVE ' + wave, 10, boss ? 48 : 30);
    ctx.fillStyle = player.power >= 7 ? '#80ffdb' : '#adb5bd';
    ctx.fillText(player.power >= 7 ? 'PW MAX' : 'PW ' + player.power + '/7', 10, boss ? 68 : 50);
    // 스테이지 전환 배너
    if (banner && banner.life > 0) {
      banner.life--;
      const a = Math.min(1, banner.life / 30);
      ctx.globalAlpha = a;
      ctx.fillStyle = '#ffd166';
      ctx.font = 'bold 26px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText(banner.text, W/2, H * .38);
      ctx.font = 'bold 13px Courier New';
      ctx.fillStyle = '#8ecae6';
      ctx.fillText('GET READY', W/2, H * .38 + 26);
      ctx.globalAlpha = 1;
      ctx.font = 'bold 16px Courier New';
    }
  }

  // 구름 (최상단)
  for (const c of clouds) {
    ctx.globalAlpha = c.a;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w * .5, c.w * .18, 0, 0, Math.PI*2);
    ctx.ellipse(c.x - c.w * .25, c.y + 8, c.w * .3, c.w * .13, 0, 0, Math.PI*2);
    ctx.ellipse(c.x + c.w * .25, c.y + 6, c.w * .32, c.w * .14, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ---- 루프 ----
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ---- 시작 / 재시작 ----
// 터치 기기에서만 폭탄 버튼 표시 (PC는 B키 사용)
const IS_TOUCH = window.matchMedia('(pointer: coarse)').matches || navigator.maxTouchPoints > 0;
function startGame() {
  initRun();
  updateBombUI();
  state = S.PLAY;
  document.getElementById('menuPanel').classList.add('hidden');
  document.getElementById('overPanel').classList.add('hidden');
  document.getElementById('bombBtn').style.display = IS_TOUCH ? 'block' : 'none';
}
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('retryBtn').addEventListener('click', startGame);

// 메뉴 조작 안내를 기기에 맞게 표시
const menuHint = document.querySelector('#menuPanel .hint');
if (menuHint) {
  menuHint.innerHTML = IS_TOUCH
    ? '이동: 터치 드래그<br>발사: 자동 &nbsp;|&nbsp; 폭탄: 폭탄 버튼<br>★ P 파워업 &nbsp; B 폭탄 &nbsp;|&nbsp; 목숨 무한 ♥∞'
    : '이동: 방향키 / WASD<br>발사: 자동 &nbsp;|&nbsp; 폭탄: B키<br>★ P 파워업 &nbsp; B 폭탄 &nbsp;|&nbsp; 목숨 무한 ♥∞';
}

initRun();
loop();
})();
</script>
