<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Gesture Gun - Dual Wield Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Pretendard', sans-serif; }
        canvas { position: absolute; top: 0; left: 0; }
        #video-container { position: fixed; bottom: 20px; right: 20px; width: 220px; height: 165px; border-radius: 12px; overflow: hidden; border: 2px solid #3b82f6; z-index: 100; transform: scaleX(-1); box-shadow: 0 0 25px rgba(59, 130, 246, 0.4); }
        #ui-layer { position: absolute; top: 20px; left: 20px; color: white; z-index: 200; pointer-events: none; width: calc(100% - 40px); display: flex; justify-content: space-between; align-items: flex-end; }
        .hud-box { background: rgba(0,0,0,0.8); padding: 15px 25px; border-radius: 15px; border: 1px solid rgba(59, 130, 246, 0.3); backdrop-filter: blur(8px); }
        .score-val { font-size: 2.5rem; font-weight: 900; color: #3b82f6; text-shadow: 0 0 15px rgba(59, 130, 246, 0.6); line-height: 1; }
        #combo-layer { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 5rem; font-weight: 900; pointer-events: none; opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 300; text-transform: uppercase; font-style: italic; }
        #ammo-container { margin-top: 12px; display: grid; grid-template-columns: repeat(20, 1fr); gap: 3px; width: 300px; }
        .ammo-bit { height: 15px; background: #3b82f6; border-radius: 1px; transition: all 0.15s; box-shadow: 0 0 5px rgba(59, 130, 246, 0.5); }
        .ammo-bit.empty { background: rgba(255,255,255,0.05); box-shadow: none; transform: scaleY(0.5); }
        .reload-warn { color: #fbbf24; font-weight: bold; animation: blink 0.8s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.95); } }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="hud-box">
        <h1 class="text-xs uppercase tracking-[0.3em] text-blue-400 mb-1 font-bold">Dual Tactical System</h1>
        <div id="score" class="score-val">0000</div>
        <div class="text-[10px] uppercase tracking-widest text-gray-400 mt-4 mb-1">Magazine: 40 Rounds</div>
        <div id="ammo-container"></div>
    </div>
    <div class="hud-box text-right">
        <p class="text-blue-500 font-black text-lg">AKIMBO MODE</p>
        <p id="hint-text" class="text-xs text-gray-400 mt-1 italic">양손의 검지를 까딱여 사격하세요!</p>
    </div>
</div>

<div id="combo-layer">EXCELLENT!</div>

<div id="video-container">
    <video id="input_video" style="width: 100%; height: 100%; object-fit: cover;"></video>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('gameCanvas');
    const ctx = canvasElement.getContext('2d');
    const scoreEl = document.getElementById('score');
    const comboEl = document.getElementById('combo-layer');
    const ammoContainer = document.getElementById('ammo-container');
    const hintText = document.getElementById('hint-text');

    let width, height;
    let cracks = [];
    let particles = [];
    let enemies = [];
    let score = 0;
    let enemySpawnTimer = 0;

    // 게임 설정
    const MAX_AMMO = 40;
    let currentAmmo = MAX_AMMO;

    // 양손의 상태를 개별적으로 관리
    const handStates = [
        { prevY: 0, isReady: true, lastShot: 0, crosshair: { x: 0, y: 0, active: false, recoil: 0 } },
        { prevY: 0, isReady: true, lastShot: 0, crosshair: { x: 0, y: 0, active: false, recoil: 0 } }
    ];

    function initAmmoUI() {
        ammoContainer.innerHTML = '';
        for(let i=0; i<MAX_AMMO; i++) {
            const div = document.createElement('div');
            div.className = 'ammo-bit';
            ammoContainer.appendChild(div);
        }
    }

    function updateAmmoUI() {
        const bits = document.querySelectorAll('.ammo-bit');
        bits.forEach((bit, idx) => {
            if(idx < currentAmmo) bit.classList.remove('empty');
            else bit.classList.add('empty');
        });
        
        if(currentAmmo === 0) {
            hintText.innerHTML = '<span class="reload-warn">AMMO DEPLETED! FIND GOLD DRONE</span>';
        } else {
            hintText.innerText = '양손의 검지를 까딱여 사격하세요!';
        }
    }

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvasElement.width = width;
        canvasElement.height = height;
    }
    window.addEventListener('resize', resize);
    resize();
    initAmmoUI();

    function drawBackground() {
        const grad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width);
        grad.addColorStop(0, '#020617');
        grad.addColorStop(1, '#000000');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);

        ctx.strokeStyle = 'rgba(59, 130, 246, 0.08)';
        ctx.lineWidth = 1;
        for(let i=0; i<width; i+=80) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke();
        }
        for(let i=0; i<height; i+=80) {
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(width, i); ctx.stroke();
        }
    }

    class Enemy {
        constructor(isReloadType = false) {
            this.x = Math.random() * (width - 200) + 100;
            this.y = Math.random() * (height - 200) + 100;
            this.size = 35 + Math.random() * 25;
            this.vx = (Math.random() - 0.5) * 6;
            this.vy = (Math.random() - 0.5) * 6;
            this.isReloadType = isReloadType;
            this.color = isReloadType ? '#fbbf24' : '#3b82f6';
            this.rotation = 0;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if(this.x < 50 || this.x > width-50) this.vx *= -1;
            if(this.y < 50 || this.y > height-50) this.vy *= -1;
            this.rotation += 0.05;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            ctx.shadowBlur = 20;
            ctx.shadowColor = this.color;
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 3;
            
            if(this.isReloadType) {
                ctx.beginPath();
                for(let i=0; i<6; i++) {
                    const ang = (i/6) * Math.PI * 2;
                    ctx.lineTo(Math.cos(ang)*this.size/2, Math.sin(ang)*this.size/2);
                }
                ctx.closePath();
                ctx.stroke();
                ctx.fillStyle = '#fbbf24';
                ctx.beginPath(); ctx.arc(0,0, 8, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.beginPath();
                ctx.arc(0, 0, this.size/2, 0, Math.PI*2);
                ctx.stroke();
                // 십자선형 날개
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(-this.size/2, 0); ctx.lineTo(this.size/2, 0);
                ctx.moveTo(0, -this.size/2); ctx.lineTo(0, this.size/2);
                ctx.stroke();
            }
            ctx.restore();
        }
    }

    class Crack {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.lines = [];
            this.life = 1.0;
            this.createCracks();
        }
        createCracks() {
            const num = 14;
            for(let i=0; i<num; i++){
                let angle = (i/num)*Math.PI*2 + Math.random()*0.2;
                let curX = this.x, curY = this.y;
                let segments = [];
                for(let j=0; j<7; j++){
                    let nextX = curX + Math.cos(angle)* (15+Math.random()*25);
                    let nextY = curY + Math.sin(angle)* (15+Math.random()*25);
                    segments.push({x1:curX, y1:curY, x2:nextX, y2:nextY});
                    curX = nextX; curY = nextY;
                }
                this.lines.push(segments);
            }
        }
        draw() {
            ctx.strokeStyle = `rgba(200, 240, 255, ${this.life})`;
            ctx.lineWidth = 1.5;
            this.lines.forEach(s => {
                ctx.beginPath();
                s.forEach(seg => { ctx.moveTo(seg.x1, seg.y1); ctx.lineTo(seg.x2, seg.y2); });
                ctx.stroke();
            });
            this.life -= 0.012;
        }
    }

    class Particle {
        constructor(x, y, color = '255, 255, 255') {
            this.x = x; this.y = y;
            this.vx = (Math.random()-0.5)*35;
            this.vy = (Math.random()-0.5)*35 - 12;
            this.gravity = 0.6;
            this.life = 1.0;
            this.color = color;
            this.size = Math.random()*7 + 2;
        }
        update() {
            this.vx *= 0.94; this.vy += this.gravity;
            this.x += this.vx; this.y += this.vy;
            this.life -= 0.035;
        }
        draw() {
            ctx.fillStyle = `rgba(${this.color}, ${this.life})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size/2, 0, Math.PI*2);
            ctx.fill();
        }
    }

    function shoot(x, y) {
        if(currentAmmo <= 0) return;

        currentAmmo--;
        updateAmmoUI();

        cracks.push(new Crack(x, y));
        let hitType = "NONE";
        
        enemies = enemies.filter(enemy => {
            const dist = Math.hypot(enemy.x - x, enemy.y - y);
            if (dist < enemy.size) {
                if(enemy.isReloadType) {
                    hitType = "RELOAD";
                    currentAmmo = MAX_AMMO;
                    updateAmmoUI();
                } else {
                    hitType = "ENEMY";
                }
                const pColor = enemy.isReloadType ? '251, 191, 36' : '59, 130, 246';
                for(let i=0; i<50; i++) particles.push(new Particle(enemy.x, enemy.y, pColor));
                score += (enemy.isReloadType ? 50 : 200);
                scoreEl.innerText = score.toString().padStart(4, '0');
                showCombo(enemy.isReloadType ? "RELOADED" : "DOUBLE KILL!");
                return false;
            }
            return true;
        });

        for(let i=0; i<20; i++) particles.push(new Particle(x, y, '255, 255, 255'));
        
        // 섬광 효과
        if(hitType === "RELOAD") ctx.fillStyle = 'rgba(251, 191, 36, 0.3)';
        else if(hitType === "ENEMY") ctx.fillStyle = 'rgba(59, 130, 246, 0.3)';
        else ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
        ctx.fillRect(0,0,width,height);
    }

    function showCombo(text) {
        comboEl.innerText = text;
        comboEl.style.opacity = '1';
        comboEl.style.transform = 'translate(-50%, -50%) scale(1.1)';
        setTimeout(() => { 
            comboEl.style.opacity = '0';
            comboEl.style.transform = 'translate(-50%, -50%) scale(0.9)';
        }, 400);
    }

    function onResults(results) {
        ctx.clearRect(0, 0, width, height);
        drawBackground();

        enemySpawnTimer++;
        if(enemySpawnTimer > 35 && enemies.length < 10) {
            const isReload = Math.random() < 0.15;
            enemies.push(new Enemy(isReload));
            enemySpawnTimer = 0;
        }

        // 모든 조준선 상태 초기화
        handStates.forEach(s => s.crosshair.active = false);

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            results.multiHandLandmarks.forEach((landmarks, index) => {
                if (index >= 2) return; // 최대 두 손만

                const state = handStates[index];
                const indexBase = landmarks[5];
                const indexTip = landmarks[8];

                // 조준점 계산
                const ix = (1 - indexBase.x) * width;
                const iy = indexBase.y * height - 100;

                // 검지 까딱임 속도 감지
                const itipY = indexTip.y * height;
                const velocity = state.prevY - itipY;
                state.prevY = itipY;

                state.crosshair.x = ix;
                state.crosshair.y = iy + state.crosshair.recoil;
                state.crosshair.active = true;

                // 사격 로직
                if (velocity > 15) {
                    if (state.isReady && Date.now() - state.lastShot > 200) {
                        shoot(state.crosshair.x, state.crosshair.y);
                        state.lastShot = Date.now();
                        state.isReady = false;
                        state.crosshair.recoil = -60; // 강한 반동
                    }
                } else if (velocity < 1) {
                    state.isReady = true;
                }

                state.crosshair.recoil *= 0.82;
            });
        }

        enemies.forEach(e => { e.update(); e.draw(); });
        cracks = cracks.filter(c => c.life > 0);
        cracks.forEach(c => c.draw());
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => { p.update(); p.draw(); });

        handStates.forEach((state, i) => {
            if (state.crosshair.active) {
                const color = currentAmmo > 0 ? (i === 0 ? '#3b82f6' : '#60a5fa') : '#ef4444';
                ctx.save();
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                
                // 외곽 링
                ctx.beginPath();
                ctx.arc(state.crosshair.x, state.crosshair.y, 28, 0, Math.PI*2);
                ctx.stroke();

                // 십자 가이드선
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(state.crosshair.x - 45, state.crosshair.y); ctx.lineTo(state.crosshair.x - 15, state.crosshair.y);
                ctx.moveTo(state.crosshair.x + 45, state.crosshair.y); ctx.lineTo(state.crosshair.x + 15, state.crosshair.y);
                ctx.moveTo(state.crosshair.x, state.crosshair.y - 45); ctx.lineTo(state.crosshair.x, state.crosshair.y - 15);
                ctx.moveTo(state.crosshair.x, state.crosshair.y + 45); ctx.lineTo(state.crosshair.x, state.crosshair.y + 15);
                ctx.stroke();

                // 중앙 점 및 텍스트
                ctx.fillStyle = color;
                ctx.beginPath(); ctx.arc(state.crosshair.x, state.crosshair.y, 3, 0, Math.PI*2); ctx.fill();
                
                ctx.font = 'bold 10px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(i === 0 ? 'L-GUN' : 'R-GUN', state.crosshair.x, state.crosshair.y - 55);
                ctx.restore();
            }
        });
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.8,
        minTrackingConfidence: 0.8
    });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 640, height: 480
    });
    camera.start();

    function animate() { requestAnimationFrame(animate); }
    animate();
</script>

</body>
</html>
