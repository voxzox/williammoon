<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>말랑톡 - AI 메신저 시뮬레이터</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter & Pretendard -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }
        /* Custom Scrollbar for Chat Area */
        .chat-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .chat-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-scroll::-webkit-scrollbar-thumb {
            background-color: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
        }
        /* Shake animation for profile */
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
        .pulse-active {
            animation: pulse-ring 2s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-0 md:p-6 transition-colors duration-300 dark:bg-slate-900">

    <!-- App Container -->
    <div class="w-full max-w-md h-[100vh] md:h-[850px] bg-white rounded-none md:rounded-3xl shadow-2xl flex flex-col overflow-hidden border border-slate-200/80 relative transition-all">
        
        <!-- Header / Status Bar -->
        <header id="chat-header" class="bg-[#BACEE0] text-slate-800 px-4 pt-3 pb-3 flex flex-col border-b border-black/5 shrink-0 transition-colors duration-300">
            <!-- Simulated Phone Status Bar -->
            <div class="flex justify-between items-center text-xs opacity-75 font-medium mb-2">
                <span id="live-clock">20:52</span>
                <div class="flex items-center gap-1.5">
                    <i data-lucide="wifi" class="w-3.5 h-3.5"></i>
                    <i data-lucide="battery" class="w-4 h-4"></i>
                </div>
            </div>
            
            <!-- Chat Partner Navigation / Info -->
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar(true)" class="p-1 hover:bg-black/10 rounded-full transition relative">
                        <i data-lucide="menu" class="w-6 h-6 text-slate-700"></i>
                        <span id="sidebar-badge" class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full hidden"></span>
                    </button>
                    <!-- Partner Avatar -->
                    <div class="relative">
                        <img id="header-avatar" src="https://placehold.co/100x100/fbbf24/ffffff?text=김민우" alt="profile" class="w-10 h-10 rounded-full object-cover border border-white/20">
                        <span id="status-dot" class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-[#BACEE0] rounded-full"></span>
                    </div>
                    <div>
                        <h1 id="header-partner-name" class="font-bold text-base text-slate-900 flex items-center gap-1.5">
                            김민우
                        </h1>
                        <p id="header-partner-status" class="text-xs text-slate-600 font-medium">온라인</p>
                    </div>
                </div>
                
                <!-- Utilities -->
                <div class="flex items-center gap-2">
                    <button onclick="toggleAudio()" id="btn-audio" class="p-2 hover:bg-black/10 rounded-full text-slate-700 transition" title="알림음 토글">
                        <i id="icon-audio" data-lucide="volume-2" class="w-5 h-5"></i>
                    </button>
                    <button onclick="openSettingsModal()" class="p-2 hover:bg-black/10 rounded-full text-slate-700 transition">
                        <i data-lucide="settings" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Character Choice Drawer Sidebar -->
        <div id="sidebar-overlay" onclick="toggleSidebar(false)" class="absolute inset-0 bg-black/40 z-40 hidden backdrop-blur-xs transition-opacity duration-300"></div>
        <aside id="sidebar" class="absolute left-0 top-0 bottom-0 w-72 bg-white z-50 transform -translate-x-full transition-transform duration-300 ease-out flex flex-col shadow-2xl dark:bg-slate-800 text-slate-800 dark:text-white">
            <div class="p-5 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">
                <h2 class="font-bold text-lg flex items-center gap-2">
                    <i data-lucide="users" class="text-yellow-500"></i>대화 상대 선택
                </h2>
                <button onclick="toggleSidebar(false)" class="p-1 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <!-- Character List -->
            <div class="flex-1 overflow-y-auto p-3 space-y-2">
                <p class="text-xs text-slate-400 px-2 pb-1 font-semibold uppercase tracking-wider">채팅방 목록</p>
                
                <!-- Character 1 -->
                <button onclick="selectCharacter('minwoo')" id="char-minwoo" class="char-btn w-full p-3 rounded-xl flex items-center gap-3 transition text-left hover:bg-slate-100 dark:hover:bg-slate-700 bg-yellow-50/75 border-l-4 border-yellow-500">
                    <img src="https://placehold.co/100x100/fbbf24/ffffff?text=민우" class="w-11 h-11 rounded-full object-cover">
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-baseline">
                            <span class="font-bold text-sm text-slate-900 dark:text-white">김민우</span>
                            <span class="text-[10px] text-slate-400">오후 8:42</span>
                        </div>
                        <p class="text-xs text-slate-500 dark:text-slate-400 truncate mt-0.5">나 지금 과제하는 중인데</p>
                    </div>
                </button>

                <!-- Character 2 -->
                <button onclick="selectCharacter('saea')" id="char-saea" class="char-btn w-full p-3 rounded-xl flex items-center gap-3 transition text-left hover:bg-slate-100 dark:hover:bg-slate-700">
                    <img src="https://placehold.co/100x100/ec4899/ffffff?text=세아" class="w-11 h-11 rounded-full object-cover">
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-baseline">
                            <span class="font-bold text-sm text-slate-900 dark:text-white">한세아</span>
                            <span class="text-[10px] text-slate-400">오후 7:16</span>
                        </div>
                        <p class="text-xs text-slate-500 dark:text-slate-400 truncate mt-0.5">조금 섭섭하게 느껴져서 그래..</p>
                    </div>
                </button>

                <!-- Character 3 -->
                <button onclick="selectCharacter('boss')" id="char-boss" class="char-btn w-full p-3 rounded-xl flex items-center gap-3 transition text-left hover:bg-slate-100 dark:hover:bg-slate-700">
                    <img src="https://placehold.co/100x100/6b7280/ffffff?text=부장" class="w-11 h-11 rounded-full object-cover">
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-baseline">
                            <span class="font-bold text-sm text-slate-900 dark:text-white">박민석 부장</span>
                            <span class="text-[10px] text-slate-400">오후 5:32</span>
                        </div>
                        <p class="text-xs text-slate-500 dark:text-slate-400 truncate mt-0.5">약간 아쉬운 점이 보이지만 수고했네. 허허.</p>
                    </div>
                </button>

                <!-- Character 4 -->
                <button onclick="selectCharacter('jieun')" id="char-jieun" class="char-btn w-full p-3 rounded-xl flex items-center gap-3 transition text-left hover:bg-slate-100 dark:hover:bg-slate-700">
                    <img src="https://placehold.co/100x100/10b981/ffffff?text=지은" class="w-11 h-11 rounded-full object-cover">
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-baseline">
                            <span class="font-bold text-sm text-slate-900 dark:text-white">이지은 대리</span>
                            <span class="text-[10px] text-slate-400">오후 4:10</span>
                        </div>
                        <p class="text-xs text-slate-500 dark:text-slate-400 truncate mt-0.5">오늘 업무 수고 정말 많으셨습니다!</p>
                    </div>
                </button>
            </div>

            <!-- Sidebar Footer Info -->
            <div class="p-4 bg-slate-50 dark:bg-slate-900 border-t border-slate-100 dark:border-slate-700 text-xs text-slate-500 text-center flex flex-col gap-1">
                <p>본 앱은 웹 브라우저에서 실행되는</p>
                <p class="font-bold text-slate-600 dark:text-slate-300">실시간 AI 카톡 시뮬레이터입니다.</p>
            </div>
        </aside>

        <!-- Chat Area -->
        <main id="chat-window" class="flex-1 bg-[#BACEE0] overflow-y-auto p-4 space-y-4 chat-scroll flex flex-col transition-colors duration-300 relative">
            
            <!-- Date Separator -->
            <div class="flex justify-center my-2">
                <span id="chat-date" class="bg-black/15 text-white text-[11px] font-medium px-3 py-1 rounded-full tracking-wide">
                    2026년 6월 9일 화요일
                </span>
            </div>

            <!-- Dynamic Chat Bubbles Wrapper -->
            <div id="messages-container" class="space-y-4 flex flex-col justify-end min-h-full">
                <!-- Messages will be injected dynamically via JS -->
            </div>

            <!-- Floating Typing Indicator -->
            <div id="typing-indicator" class="flex items-start gap-2.5 opacity-0 pointer-events-none transition-all duration-300 absolute bottom-4 left-4 z-10">
                <img id="typing-avatar" src="https://placehold.co/100x100/fbbf24/ffffff?text=MW" class="w-9 h-9 rounded-full object-cover">
                <div class="flex flex-col gap-1">
                    <span id="typing-name" class="text-xs text-slate-600 font-medium">김민우</span>
                    <div class="bg-white text-slate-800 rounded-2xl rounded-tl-none px-3.5 py-2.5 shadow-sm max-w-[240px] text-sm flex items-center gap-1">
                        <span class="animate-bounce" style="animation-delay: 0s">●</span>
                        <span class="animate-bounce" style="animation-delay: 0.15s">●</span>
                        <span class="animate-bounce" style="animation-delay: 0.3s">●</span>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer Input Area -->
        <footer class="bg-white px-3 py-2 border-t border-slate-200/80 flex flex-col gap-1.5 shrink-0 dark:bg-slate-800 dark:border-slate-700">
            <!-- Utility Presets Quick Buttons -->
            <div class="flex items-center gap-1.5 overflow-x-auto pb-1.5 scrollbar-none scroll-smooth">
                <button onclick="insertQuickMessage('나 지금 밥 먹고 있음!')" class="bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 text-xs px-3 py-1.5 rounded-full whitespace-nowrap transition">
                    🍚 밥 먹는 중
                </button>
                <button onclick="insertQuickMessage('오늘 하루 어떻게 보냈어?')" class="bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 text-xs px-3 py-1.5 rounded-full whitespace-nowrap transition">
                    💬 오늘 뭐했어?
                </button>
                <button onclick="insertQuickMessage('오늘 힘든 일이 조금 있었어')" class="bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 text-xs px-3 py-1.5 rounded-full whitespace-nowrap transition">
                    🥺 힘든 일 있었어
                </button>
                <button onclick="sendSimulatedImage()" class="bg-amber-100 hover:bg-amber-200 text-amber-800 dark:bg-amber-900/30 dark:hover:bg-amber-900/50 dark:text-amber-300 text-xs px-3 py-1.5 rounded-full whitespace-nowrap transition font-semibold flex items-center gap-1">
                    🖼️ 사진 전송
                </button>
                <button onclick="sendSimulatedVoice()" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-800 dark:bg-indigo-900/30 dark:hover:bg-indigo-900/50 dark:text-indigo-300 text-xs px-3 py-1.5 rounded-full whitespace-nowrap transition font-semibold flex items-center gap-1">
                    🎙️ 음성 전송
                </button>
            </div>

            <!-- Input Controls Form -->
            <div class="flex items-end gap-2">
                <!-- Plus Button -->
                <button onclick="toggleMediaMenu()" class="p-2.5 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition shrink-0" title="추가 메뉴">
                    <i data-lucide="plus-circle" class="w-6 h-6"></i>
                </button>
                
                <!-- Chat Input Input area -->
                <div class="flex-1 bg-slate-100 dark:bg-slate-700 rounded-2xl px-3 py-2 flex items-end">
                    <textarea id="chat-input" rows="1" placeholder="메시지를 입력하세요..." class="w-full bg-transparent border-none outline-none resize-none text-sm text-slate-800 dark:text-white max-h-24 py-1" onkeydown="handleKeyPress(event)" oninput="autoExpandTextarea(this)"></textarea>
                    
                    <!-- Emoticon Toggle button -->
                    <button onclick="openEmojiPicker()" class="p-1 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition shrink-0" title="이모티콘">
                        <i data-lucide="smile" class="w-5 h-5"></i>
                    </button>
                </div>
                
                <!-- Send Button -->
                <button onclick="sendMessage()" id="btn-send" class="p-3 bg-yellow-400 hover:bg-yellow-500 text-slate-900 rounded-xl transition duration-150 transform hover:scale-105 active:scale-95 flex items-center justify-center shrink-0 shadow-md">
                    <i data-lucide="send" class="w-5 h-5"></i>
                </button>
            </div>
        </footer>
    </div>

    <!-- Emoji / Reaction Modal -->
    <div id="emoji-picker-modal" class="absolute inset-0 bg-black/40 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl transition-all">
            <div class="p-4 bg-yellow-400 text-slate-900 flex justify-between items-center font-bold">
                <span>이모지 & 감정 반응 전송</span>
                <button onclick="closeEmojiPicker()"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-4 grid grid-cols-5 gap-3 text-2xl text-center">
                <button onclick="sendEmoji('👍')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition duration-100">👍</button>
                <button onclick="sendEmoji('❤️')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition duration-100">❤️</button>
                <button onclick="sendEmoji('😂')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition duration-100">😂</button>
                <button onclick="sendEmoji('😮')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition duration-100">😮</button>
                <button onclick="sendEmoji('😭')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition duration-100">😭</button>
                <button onclick="sendEmoji('🙏')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition duration-100">🙏</button>
                <button onclick="sendEmoji('🔥')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition duration-100">🔥</button>
                <button onclick="sendEmoji('🎉')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition duration-100">🎉</button>
                <button onclick="sendEmoji('🤔')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition duration-100">🤔</button>
                <button onclick="sendEmoji('🍀')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition duration-100">🍀</button>
            </div>
        </div>
    </div>

    <!-- Media Plus Menu Modal -->
    <div id="media-modal" class="absolute inset-0 bg-black/40 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-xs overflow-hidden shadow-2xl transition-all">
            <div class="p-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center font-bold text-slate-800 dark:text-white">
                <span>추가 메뉴 시뮬레이터</span>
                <button onclick="toggleMediaMenu()"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-4 grid grid-cols-2 gap-4">
                <button onclick="sendPresetPhoto('식사')" class="flex flex-col items-center gap-2 p-3 bg-slate-50 dark:bg-slate-700 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-600 transition">
                    <span class="text-3xl">🍲</span>
                    <span class="text-xs text-slate-700 dark:text-slate-300">식사 공유</span>
                </button>
                <button onclick="sendPresetPhoto('풍경')" class="flex flex-col items-center gap-2 p-3 bg-slate-50 dark:bg-slate-700 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-600 transition">
                    <span class="text-3xl">🌳</span>
                    <span class="text-xs text-slate-700 dark:text-slate-300">풍경 공유</span>
                </button>
                <button onclick="sendGiftMessage()" class="flex flex-col items-center gap-2 p-3 bg-yellow-50 dark:bg-yellow-900/20 rounded-xl hover:bg-yellow-100 dark:hover:bg-yellow-900/40 transition border border-yellow-200">
                    <span class="text-3xl">🎁</span>
                    <span class="text-xs text-amber-800 dark:text-amber-300 font-semibold">선물 보내기</span>
                </button>
                <button onclick="simulateIncomingCall()" class="flex flex-col items-center gap-2 p-3 bg-green-50 dark:bg-green-900/20 rounded-xl hover:bg-green-100 dark:hover:bg-green-900/40 transition border border-green-200">
                    <span class="text-3xl">📞</span>
                    <span class="text-xs text-green-800 dark:text-green-300 font-semibold">보이스톡 오기</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Interactive Custom Settings Modal -->
    <div id="settings-modal" class="absolute inset-0 bg-black/40 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 text-slate-800 dark:text-white rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl transition-all">
            <div class="p-4 bg-slate-100 dark:bg-slate-700 flex justify-between items-center font-bold">
                <span class="flex items-center gap-1.5"><i data-lucide="sliders-horizontal" class="w-5 h-5"></i>시뮬레이터 설정</span>
                <button onclick="closeSettingsModal()"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-5 space-y-4">
                <!-- User Name Customization -->
                <div>
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase mb-1">내 이름 설정</label>
                    <input type="text" id="input-my-name" value="이몽룡" class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400">
                </div>

                <!-- Custom Partner Name -->
                <div>
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase mb-1">상대방 애칭 변경</label>
                    <input type="text" id="input-partner-name" class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400">
                </div>

                <!-- Gemini API Key (Optional) -->
                <div>
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase mb-1">개인 Gemini API Key (선택사항)</label>
                    <input type="password" id="input-api-key" placeholder="자동 연동 키가 활성화되어 있습니다." class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-yellow-400">
                    <p class="text-[10px] text-slate-400 mt-1">플랫폼 기본 키가 내장되어 있어 입력 없이도 실시간 AI 기능이 바로 작동합니다.</p>
                </div>

                <!-- Theme/Wallpaper Selection -->
                <div>
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase mb-1.5">카톡 배경 테마</label>
                    <div class="grid grid-cols-4 gap-2">
                        <button onclick="changeTheme('#BACEE0')" class="w-full h-8 bg-[#BACEE0] rounded-lg border-2 border-white ring-1 ring-black/10 transition hover:scale-105"></button>
                        <button onclick="changeTheme('#F2C94C')" class="w-full h-8 bg-[#F2C94C] rounded-lg border-2 border-white ring-1 ring-black/10 transition hover:scale-105"></button>
                        <button onclick="changeTheme('#82F2D4')" class="w-full h-8 bg-[#82F2D4] rounded-lg border-2 border-white ring-1 ring-black/10 transition hover:scale-105"></button>
                        <button onclick="changeTheme('#F2994A')" class="w-full h-8 bg-[#F2994A] rounded-lg border-2 border-white ring-1 ring-black/10 transition hover:scale-105"></button>
                    </div>
                </div>

                <!-- System Message -->
                <div class="flex items-center gap-2 pt-2">
                    <input type="checkbox" id="check-dark-mode" onchange="toggleDarkMode(this.checked)" class="w-4 h-4 text-yellow-500 rounded border-gray-300 focus:ring-yellow-400">
                    <label for="check-dark-mode" class="text-sm font-medium">다크 모드 적용</label>
                </div>

                <!-- Reset Button -->
                <div class="pt-2">
                    <button onclick="resetAllChats()" class="w-full py-2.5 bg-red-100 hover:bg-red-200 text-red-600 font-semibold rounded-xl text-xs transition flex items-center justify-center gap-1.5">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>대화 내용 전체 초기화
                    </button>
                </div>
            </div>
            
            <div class="p-4 bg-slate-50 dark:bg-slate-900 border-t border-slate-100 dark:border-slate-700 flex justify-end">
                <button onclick="saveSettings()" class="px-4 py-2 bg-yellow-400 hover:bg-yellow-500 text-slate-900 font-bold rounded-xl text-xs shadow-md transition">저장하기</button>
            </div>

                const osc1 = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc1.type = 'triangle';
                osc1.frequency.setValueAtTime(880, now); // A5
                osc1.frequency.exponentialRampToValueAtTime(1320, now + 0.12);

                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(660, now + 0.08); 
                osc2.frequency.exponentialRampToValueAtTime(1320, now + 0.2);

                gain.gain.setValueAtTime(0.12, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.45);

                osc1.connect(gain);
                osc2.connect(gain);
                gain.connect(audioCtx.destination);

                osc1.start(now);
                osc2.start(now + 0.08);

                osc1.stop(now + 0.45);
                osc2.stop(now + 0.45);

        // Helper to format chat history strictly matching Gemini payload API schema
        function getGeminiHistory(charId) {
            const logs = chatLogs[charId].initialMsgs;
            // Filter to text and limit length to ensure fast performance & clear focus
            const textLogs = logs.filter(msg => msg.text && (!msg.type || msg.type === 'text'));
            
            // Map sender role appropriately
            return textLogs.slice(-12).map(msg => ({
                role: msg.sender === 'me' ? 'user' : 'model',
                parts: [{ text: msg.text }]
            }));
        }

        // Context-aware calling of Gemini Model using Fetch API
        async function fetchAIResponse(charId, userMessage) {
            const apiKey = userApiKey || ""; // Canvas auto-injects if blank, otherwise uses user key
            const model = "gemini-3-flash-preview";
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
            
            // Build historical chat sequence including system instruction
            const chatHistory = getGeminiHistory(charId);
            const systemPrompt = characters[charId].systemPrompt + `\n현재 사용자의 실제 이름은 '${myName}'입니다. 대화 중 가끔 이름을 부른다면 이 이름을 언급해 주세요.`;

            const payload = {
                contents: chatHistory,
                systemInstruction: {
                    parts: [{ text: systemPrompt }]
                }
            };

            // Implementation of Exponential Backoff for stability
            let delay = 1000;
            const maxRetries = 2;
            
            for (let attempt = 0; attempt <= maxRetries; attempt++) {
                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP Error status: ${response.status}`);
                    }

                    const result = await response.json();
                    const aiText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (aiText) {
                        return aiText.trim();
                    }
                } catch (error) {
                    if (attempt === maxRetries) {
                        console.warn("Gemini API call failed after retries. Using localized fallback text. error:", error);
                        break;
                    }
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }

            // Return localized random polite fallback if API call fails entirely
            const fallbacks = fallbackResponses[charId];
            return fallbacks[Math.floor(Math.random() * fallbacks.length)];
        }

        function autoExpandTextarea(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        function scrollToBottom() {
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function sendEmoji(emoji) {
            const timestamp = updateClock();
            chatLogs[currentCharacter].initialMsgs.push({ sender: 'me', text: emoji, time: timestamp, read: true });
            renderChats();
            closeEmojiPicker();
            playKakaoSound();
            
            setTimeout(() => {
                triggerTypingResponse(emoji);
            }, 1000);
        }

        function sendSimulatedImage() {
            const presetImages = [
                'https://placehold.co/400x300/3b82f6/ffffff?text=Blue+Sky',
                'https://placehold.co/400x300/10b981/ffffff?text=Green+Nature',
                'https://placehold.co/400x300/f59e0b/ffffff?text=Sunset+Orange'
            ];
            const chosen = presetImages[Math.floor(Math.random() * presetImages.length)];
            const timestamp = updateClock();
            
            chatLogs[currentCharacter].initialMsgs.push({ 
                sender: 'me', 
                text: "사진을 보냈습니다.", 
                time: timestamp, 
                read: true,
                type: 'image',
                meta: chosen
            });
            renderChats();
            playKakaoSound();

            setTimeout(() => {
                triggerTypingResponse("이 사진 뭐야? 풍경이 너무 멋지다!");
            }, 1200);
        }

        function sendSimulatedVoice() {
            const timestamp = updateClock();
            chatLogs[currentCharacter].initialMsgs.push({ 
                sender: 'me', 
                text: "음성 메시지", 
                time: timestamp, 
                read: true,
                type: 'voice'
            });
            renderChats();
            playKakaoSound();

            setTimeout(() => {
                triggerTypingResponse("보내준 목소리 메시지 잘 들었어! 고마워 ㅎㅎ");
            }, 1400);
        }

        function sendPresetPhoto(theme) {
            let imgUrl = 'https://placehold.co/400x300/ea580c/ffffff?text=Delicious+Food';
            let desc = "나 지금 맛있는 거 먹는 중이야!";
            
            if (theme === '풍경') {
                imgUrl = 'https://placehold.co/400x300/0284c7/ffffff?text=Green+Park';
                desc = "여기 공원에 산책 나왔어, 날씨 정말 좋다!";
            }
            
            const timestamp = updateClock();
            chatLogs[currentCharacter].initialMsgs.push({ 
                sender: 'me', 
                text: desc, 
                time: timestamp, 
                read: true,
                type: 'image',
                meta: imgUrl
            });
            renderChats();
            toggleMediaMenu();
            playKakaoSound();

            setTimeout(() => {
                triggerTypingResponse(theme === '풍경' ? "와,, 사진만 봐도 힐링되는 기분이야!" : "정말 맛있어 보인다! 나도 한 입 먹고 싶네 ㅎㅎ");
            }, 1200);
        }

        function sendGiftMessage() {
            const timestamp = updateClock();
            chatLogs[currentCharacter].initialMsgs.push({ 
                sender: 'me', 
                text: "스타벅스 아이스 아메리카노 기프티콘", 
                time: timestamp, 
                read: true,
                type: 'gift'
            });
            renderChats();
            toggleMediaMenu();
            playKakaoSound();

            setTimeout(() => {
                triggerTypingResponse("어머나 대박! 이런 따뜻한 선물 너무 감동이야 ㅠㅠ 정말 고마워 맛있게 잘 마실게!");
            }, 1500);
        }

        function simulateIncomingCall() {
            toggleMediaMenu();
            headerPartnerStatus.innerText = "전화 연결 중...";
            
            setTimeout(() => {
                const timestamp = updateClock();
                chatLogs[currentCharacter].initialMsgs.push({ 
                    sender: 'other', 
                    text: "보이스톡 종료", 
                    time: timestamp, 
                    type: 'call'
                });
                renderChats();
                headerPartnerStatus.innerText = "온라인";
                playKakaoSound();
            }, 3000);
        }

        function toggleSidebar(show) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (show) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function openEmojiPicker() {
            document.getElementById('emoji-picker-modal').classList.remove('hidden');
        }

        function closeEmojiPicker() {
            document.getElementById('emoji-picker-modal').classList.add('hidden');
        }

        function toggleMediaMenu() {
            const modal = document.getElementById('media-modal');
            modal.classList.toggle('hidden');
        }

        function openSettingsModal() {
            document.getElementById('input-partner-name').value = characters[currentCharacter].name;
            document.getElementById('input-my-name').value = myName;
            document.getElementById('input-api-key').value = userApiKey;
            document.getElementById('settings-modal').classList.remove('hidden');
        }

        function closeSettingsModal() {
            document.getElementById('settings-modal').classList.add('hidden');
        }

        function saveSettings() {
            const newPartnerName = document.getElementById('input-partner-name').value;
            const newMyName = document.getElementById('input-my-name').value;
            const newApiKey = document.getElementById('input-api-key').value;
            
            if (newPartnerName.trim()) {
                characters[currentCharacter].name = newPartnerName;
                headerPartnerName.innerText = newPartnerName;
            }
            if (newMyName.trim()) {
                myName = newMyName;
            }
            userApiKey = newApiKey.trim();
            
            closeSettingsModal();
        }

        function changeTheme(colorCode) {
            document.getElementById('chat-header').style.backgroundColor = colorCode;
            document.getElementById('chat-window').style.backgroundColor = colorCode;
            document.getElementById('status-dot').style.borderColor = colorCode;
        }

        function toggleDarkMode(isDark) {
            if (isDark) {
                document.documentElement.classList.add('dark');
                document.body.classList.add('dark:bg-slate-900');
            } else {
                document.documentElement.classList.remove('dark');
                document.body.classList.remove('dark:bg-slate-900');
            }
        }

        function resetAllChats() {
            chatLogs = JSON.parse(JSON.stringify(characters));
            renderChats();
            closeSettingsModal();
        }

        function viewPhoto(url) {
            const overlay = document.createElement('div');
            overlay.className = "fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 cursor-pointer";
            overlay.onclick = () => overlay.remove();
            
            const img = document.createElement('img');
            img.src = url;
            img.className = "max-w-full max-h-[85vh] rounded-xl shadow-2xl";
            
            overlay.appendChild(img);
            document.body.appendChild(overlay);
        }

        window.onload = function() {
            lucide.createIcons();
            selectCharacter('minwoo');
        }
    </script>
</body>
</html>
