<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>말랑톡 - AI 메신저 시뮬레이터</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter & Pretendard -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }
        /* Custom Scrollbar for Chat Area */
        .chat-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .chat-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-scroll::-webkit-scrollbar-thumb {
            background-color: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
        }
        /* Notification Toast slide down */
        @keyframes slide-down {
            0% { transform: translateY(-110%); opacity: 0; }
            15% { transform: translateY(0); opacity: 1; }
            85% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-110%); opacity: 0; }
        }
        .toast-notify {
            animation: slide-down 4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-0 md:p-6 transition-colors duration-300 dark:bg-slate-900">

    <!-- App Container -->
    <div class="w-full max-w-md h-[100vh] md:h-[850px] bg-white rounded-none md:rounded-3xl shadow-2xl flex flex-col overflow-hidden border border-slate-200/80 relative transition-all">
        
        <!-- Push Notification Toast Overlay (Top of Screen) -->
        <div id="notification-toast" onclick="handleNotificationClick()" class="absolute top-4 left-4 right-4 bg-slate-900/95 text-white p-3 rounded-2xl shadow-xl z-50 flex items-center gap-3 transform -translate-y-40 opacity-0 pointer-events-none transition-all duration-300 border border-white/10 backdrop-blur-md cursor-pointer hover:bg-slate-850">
            <img id="toast-avatar" src="" class="w-10 h-10 rounded-full object-cover border border-white/10">
            <div class="flex-1 min-w-0">
                <div class="flex justify-between items-baseline">
                    <span id="toast-sender-name" class="font-bold text-xs text-yellow-400">보낸 사람</span>
                    <span class="text-[9px] text-slate-400">지금</span>
                </div>
                <p id="toast-message-body" class="text-xs text-slate-200 truncate mt-0.5 font-medium">메시지 본문 내용</p>
            </div>
            <div class="p-1 bg-white/10 rounded-full">
                <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
            </div>
        </div>

        <!-- Header / Status Bar -->
        <header id="chat-header" class="bg-[#BACEE0] text-slate-800 px-4 pt-3 pb-3 flex flex-col border-b border-black/5 shrink-0 transition-colors duration-300">
            <!-- Simulated Phone Status Bar -->
            <div class="flex justify-between items-center text-xs opacity-75 font-medium mb-2">
                <span id="live-clock">20:52</span>
                <div class="flex items-center gap-1.5">
                    <i data-lucide="wifi" class="w-3.5 h-3.5"></i>
                    <i data-lucide="battery" class="w-4 h-4"></i>
                </div>
            </div>
            
            <!-- Chat Partner Navigation / Info -->
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar(true)" class="p-1 hover:bg-black/10 rounded-full transition relative">
                        <i data-lucide="menu" class="w-6 h-6 text-slate-700"></i>
                        <span id="sidebar-badge" class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full hidden"></span>
                    </button>
                    <!-- Partner Avatar -->
                    <div class="relative">
                        <img id="header-avatar" src="https://placehold.co/100x100/fbbf24/ffffff?text=민우" alt="profile" class="w-10 h-10 rounded-full object-cover border border-white/20">
                        <span id="status-dot" class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-[#BACEE0] rounded-full"></span>
                    </div>
                    <div>
                        <h1 id="header-partner-name" class="font-bold text-base text-slate-900 flex items-center gap-1.5 cursor-pointer hover:underline" onclick="openSettingsModal()">
                            김민우
                            <i data-lucide="pencil" class="w-3 h-3 text-slate-600"></i>
                        </h1>
                        <p id="header-partner-status" class="text-xs text-slate-600 font-medium">온라인</p>
                    </div>
                </div>
                
                <!-- Utilities -->
                <div class="flex items-center gap-2">
                    <button onclick="toggleAudio()" id="btn-audio" class="p-2 hover:bg-black/10 rounded-full text-slate-700 transition" title="알림음 토글">
                        <i id="icon-audio" data-lucide="volume-2" class="w-5 h-5"></i>
                    </button>
                    <button onclick="openSettingsModal()" class="p-2 hover:bg-black/10 rounded-full text-slate-700 transition" title="프로필 및 테마 설정">
                        <i data-lucide="settings" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Character Choice Drawer Sidebar -->
        <div id="sidebar-overlay" onclick="toggleSidebar(false)" class="absolute inset-0 bg-black/40 z-40 hidden backdrop-blur-xs transition-opacity duration-300"></div>
        <aside id="sidebar" class="absolute left-0 top-0 bottom-0 w-72 bg-white z-50 transform -translate-x-full transition-transform duration-300 ease-out flex flex-col shadow-2xl dark:bg-slate-800 text-slate-800 dark:text-white">
            <div class="p-5 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">
                <h2 class="font-bold text-lg flex items-center gap-2">
                    <i data-lucide="users" class="text-yellow-500"></i>대화 상대 선택
                </h2>
                <button onclick="toggleSidebar(false)" class="p-1 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <!-- Character List -->
            <div class="flex-1 overflow-y-auto p-3 space-y-2" id="sidebar-char-list">
                <p class="text-xs text-slate-400 px-2 pb-1 font-semibold uppercase tracking-wider">채팅방 목록</p>
                
                <!-- Character 1 -->
                <button onclick="selectCharacter('minwoo')" id="char-minwoo" class="char-btn w-full p-3 rounded-xl flex items-center gap-3 transition text-left hover:bg-slate-100 dark:hover:bg-slate-700 bg-yellow-50/75 border-l-4 border-yellow-500">
                    <img id="sidebar-avatar-minwoo" src="https://placehold.co/100x100/fbbf24/ffffff?text=민우" class="w-11 h-11 rounded-full object-cover">
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-baseline">
                            <span id="sidebar-name-minwoo" class="font-bold text-sm text-slate-900 dark:text-white">김민우</span>
                            <span class="text-[10px] text-slate-400">오후 8:42</span>
                        </div>
                        <p id="sidebar-desc-minwoo" class="text-xs text-slate-500 dark:text-slate-400 truncate mt-0.5">나 지금 과제하는 중인데</p>
                    </div>
                </button>

                <!-- Character 2 -->
                <button onclick="selectCharacter('saea')" id="char-saea" class="char-btn w-full p-3 rounded-xl flex items-center gap-3 transition text-left hover:bg-slate-100 dark:hover:bg-slate-700">
                    <img id="sidebar-avatar-saea" src="https://placehold.co/100x100/ec4899/ffffff?text=세아" class="w-11 h-11 rounded-full object-cover">
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-baseline">
                            <span id="sidebar-name-saea" class="font-bold text-sm text-slate-900 dark:text-white">한세아</span>
                            <span class="text-[10px] text-slate-400">오후 7:16</span>
                        </div>
                        <p id="sidebar-desc-saea" class="text-xs text-slate-500 dark:text-slate-400 truncate mt-0.5">조금 섭섭하게 느껴져서 그래..</p>
                    </div>
                </button>

                <!-- Character 3 -->
                <button onclick="selectCharacter('boss')" id="char-boss" class="char-btn w-full p-3 rounded-xl flex items-center gap-3 transition text-left hover:bg-slate-100 dark:hover:bg-slate-700">
                    <img id="sidebar-avatar-boss" src="https://placehold.co/100x100/6b7280/ffffff?text=부장" class="w-11 h-11 rounded-full object-cover">
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-baseline">
                            <span id="sidebar-name-boss" class="font-bold text-sm text-slate-900 dark:text-white">박민석 부장</span>
                            <span class="text-[10px] text-slate-400">오후 5:32</span>
                        </div>
                        <p id="sidebar-desc-boss" class="text-xs text-slate-500 dark:text-slate-400 truncate mt-0.5">약간 아쉬운 점이 보이지만 수고했네. 허허.</p>
                    </div>
                </button>

                <!-- Character 4 -->
                <button onclick="selectCharacter('jieun')" id="char-jieun" class="char-btn w-full p-3 rounded-xl flex items-center gap-3 transition text-left hover:bg-slate-100 dark:hover:bg-slate-700">
                    <img id="sidebar-avatar-jieun" src="https://placehold.co/100x100/10b981/ffffff?text=지은" class="w-11 h-11 rounded-full object-cover">
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-baseline">
                            <span id="sidebar-name-jieun" class="font-bold text-sm text-slate-900 dark:text-white">이지은 대리</span>
                            <span class="text-[10px] text-slate-400">오후 4:10</span>
                        </div>
                        <p id="sidebar-desc-jieun" class="text-xs text-slate-500 dark:text-slate-400 truncate mt-0.5">오늘 업무 수고 정말 많으셨습니다!</p>
                    </div>
                </button>
            </div>

            <!-- Sidebar Footer Info -->
            <div class="p-4 bg-slate-50 dark:bg-slate-900 border-t border-slate-100 dark:border-slate-700 text-xs text-slate-500 text-center flex flex-col gap-1">
                <p>본 앱은 웹 브라우저에서 실행되는</p>
                <p class="font-bold text-slate-600 dark:text-slate-300">실시간 AI 카톡 시뮬레이터입니다.</p>
            </div>
        </aside>

        <!-- Chat Area -->
        <main id="chat-window" class="flex-1 bg-[#BACEE0] overflow-y-auto p-4 space-y-4 chat-scroll flex flex-col transition-colors duration-300 relative">
            
            <!-- Date Separator -->
            <div class="flex justify-center my-2">
                <span id="chat-date" class="bg-black/15 text-white text-[11px] font-medium px-3 py-1 rounded-full tracking-wide">
                    2026년 6월 14일 일요일
                </span>
            </div>

            <!-- Dynamic Chat Bubbles Wrapper -->
            <div id="messages-container" class="space-y-4 flex flex-col justify-end min-h-full">
                <!-- Messages will be injected dynamically via JS -->
            </div>

            <!-- Floating Typing Indicator -->
            <div id="typing-indicator" class="flex items-start gap-2.5 opacity-0 pointer-events-none transition-all duration-300 absolute bottom-4 left-4 z-10">
                <img id="typing-avatar" src="https://placehold.co/100x100/fbbf24/ffffff?text=MW" class="w-9 h-9 rounded-full object-cover">
                <div class="flex flex-col gap-1">
                    <span id="typing-name" class="text-xs text-slate-600 font-medium">김민우</span>
                    <div class="bg-white text-slate-800 rounded-2xl rounded-tl-none px-3.5 py-2.5 shadow-sm max-w-[240px] text-sm flex items-center gap-1">
                        <span class="animate-bounce" style="animation-delay: 0s">●</span>
                        <span class="animate-bounce" style="animation-delay: 0.15s">●</span>
                        <span class="animate-bounce" style="animation-delay: 0.3s">●</span>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer Input Area -->
        <footer class="bg-white px-3 py-2 border-t border-slate-200/80 flex flex-col gap-1.5 shrink-0 dark:bg-slate-800 dark:border-slate-700">
            <!-- Utility Presets Quick Buttons -->
            <div class="flex items-center gap-1.5 overflow-x-auto pb-1.5 scrollbar-none scroll-smooth">
                <button onclick="insertQuickMessage('나한테 재밌는 농담 하나만 해주라! ㅋㅋㅋ')" class="bg-yellow-100 hover:bg-yellow-200 text-yellow-800 dark:bg-yellow-900/30 dark:hover:bg-yellow-900/50 dark:text-yellow-300 text-xs px-3 py-1.5 rounded-full whitespace-nowrap transition font-semibold flex items-center gap-1">
                    🎯 농담 던져봐!
                </button>
                <button onclick="insertQuickMessage('오늘 하루 어떻게 보냈어?')" class="bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 text-xs px-3 py-1.5 rounded-full whitespace-nowrap transition">
                    💬 오늘 뭐했어?
                </button>
                <button onclick="insertQuickMessage('오늘 힘든 일이 조금 있었어')" class="bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 text-xs px-3 py-1.5 rounded-full whitespace-nowrap transition">
                    🥺 힘든 일 있었어
                </button>
                <button onclick="insertQuickMessage('사랑해')" class="bg-red-50 hover:bg-red-100 text-red-600 dark:bg-red-900/20 dark:text-red-300 text-xs px-3 py-1.5 rounded-full whitespace-nowrap transition font-bold">
                    ❤️ 사랑해
                </button>
                <button onclick="sendSimulatedImage()" class="bg-amber-100 hover:bg-amber-200 text-amber-800 dark:bg-amber-900/30 dark:hover:bg-amber-900/50 dark:text-amber-300 text-xs px-3 py-1.5 rounded-full whitespace-nowrap transition font-semibold flex items-center gap-1">
                    🖼️ 사진 전송
                </button>
                <button onclick="sendSimulatedVoice()" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-800 dark:bg-indigo-900/30 dark:hover:bg-indigo-900/50 dark:text-indigo-300 text-xs px-3 py-1.5 rounded-full whitespace-nowrap transition font-semibold flex items-center gap-1">
                    🎙️ 음성 전송
                </button>
            </div>

            <!-- Input Controls Form -->
            <div class="flex items-end gap-2">
                <!-- Plus Button -->
                <button onclick="toggleMediaMenu()" class="p-2.5 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition shrink-0" title="추가 메뉴">
                    <i data-lucide="plus-circle" class="w-6 h-6"></i>
                </button>
                
                <!-- Chat Input Input area -->
                <div class="flex-1 bg-slate-100 dark:bg-slate-700 rounded-2xl px-3 py-2 flex items-end">
                    <textarea id="chat-input" rows="1" placeholder="메시지를 입력하세요..." class="w-full bg-transparent border-none outline-none resize-none text-sm text-slate-800 dark:text-white max-h-24 py-1" onkeydown="handleKeyPress(event)" oninput="autoExpandTextarea(this)"></textarea>
                    
                    <!-- Emoticon Toggle button -->
                    <button onclick="openEmojiPicker()" class="p-1 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition shrink-0" title="이모티콘">
                        <i data-lucide="smile" class="w-5 h-5"></i>
                    </button>
                </div>
                
                <!-- Send Button -->
                <button onclick="sendMessage()" id="btn-send" class="p-3 bg-yellow-400 hover:bg-yellow-500 text-slate-900 rounded-xl transition duration-150 transform hover:scale-105 active:scale-95 flex items-center justify-center shrink-0 shadow-md">
                    <i data-lucide="send" class="w-5 h-5"></i>
                </button>
            </div>
        </footer>
    </div>

    <!-- Emoji / Reaction Modal -->
    <div id="emoji-picker-modal" class="absolute inset-0 bg-black/40 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl transition-all">
            <div class="p-4 bg-yellow-400 text-slate-900 flex justify-between items-center font-bold">
                <span>이모지 & 감정 반응 전송</span>
                <button onclick="closeEmojiPicker()"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-4 grid grid-cols-5 gap-3 text-2xl text-center">
                <button onclick="sendEmoji('👍')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition duration-100">👍</button>
                <button onclick="sendEmoji('❤️')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition duration-100">❤️</button>
                <button onclick="sendEmoji('😂')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition duration-100">😂</button>
                <button onclick="sendEmoji('😮')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition duration-100">😮</button>
                <button onclick="sendEmoji('😭')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition duration-100">😭</button>
                <button onclick="sendEmoji('🙏')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition duration-100">🙏</button>
                <button onclick="sendEmoji('🔥')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition duration-100">🔥</button>
                <button onclick="sendEmoji('🎉')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition duration-100">🎉</button>
                <button onclick="sendEmoji('🤔')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition duration-100">🤔</button>
                <button onclick="sendEmoji('🍀')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition duration-100">🍀</button>
            </div>
        </div>
    </div>

    <!-- Media Plus Menu Modal -->
    <div id="media-modal" class="absolute inset-0 bg-black/40 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-xs overflow-hidden shadow-2xl transition-all">
            <div class="p-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center font-bold text-slate-800 dark:text-white">
                <span>추가 메뉴 시뮬레이터</span>
                <button onclick="toggleMediaMenu()"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-4 grid grid-cols-2 gap-4">
                <button onclick="sendPresetPhoto('식사')" class="flex flex-col items-center gap-2 p-3 bg-slate-50 dark:bg-slate-700 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-600 transition">
                    <span class="text-3xl">🍲</span>
                    <span class="text-xs text-slate-700 dark:text-slate-300 font-medium">식사 공유</span>
                </button>
                <button onclick="sendPresetPhoto('풍경')" class="flex flex-col items-center gap-2 p-3 bg-slate-50 dark:bg-slate-700 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-600 transition">
                    <span class="text-3xl">🌳</span>
                    <span class="text-xs text-slate-700 dark:text-slate-300 font-medium">풍경 공유</span>
                </button>
                <button onclick="sendGiftMessage()" class="flex flex-col items-center gap-2 p-3 bg-yellow-50 dark:bg-yellow-900/20 rounded-xl hover:bg-yellow-100 dark:hover:bg-yellow-900/40 transition border border-yellow-200">
                    <span class="text-3xl">🎁</span>
                    <span class="text-xs text-amber-800 dark:text-amber-300 font-semibold">선물 보내기</span>
                </button>
                <button onclick="simulateIncomingCall()" class="flex flex-col items-center gap-2 p-3 bg-green-50 dark:bg-green-900/20 rounded-xl hover:bg-green-100 dark:hover:bg-green-900/40 transition border border-green-200">
                    <span class="text-3xl">📞</span>
                    <span class="text-xs text-green-800 dark:text-green-300 font-semibold">보이스톡 오기</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Interactive Custom Settings Modal -->
    <div id="settings-modal" class="absolute inset-0 bg-black/40 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 text-slate-800 dark:text-white rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl transition-all">
            <div class="p-4 bg-slate-100 dark:bg-slate-700 flex justify-between items-center font-bold">
                <span class="flex items-center gap-1.5"><i data-lucide="sliders-horizontal" class="w-5 h-5"></i>프로필 & 시뮬레이터 설정</span>
                <button onclick="closeSettingsModal()"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-5 space-y-4 max-h-[500px] overflow-y-auto chat-scroll">
                <!-- User Name Customization -->
                <div>
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase mb-1">내 이름 설정 (카톡 수신자)</label>
                    <input type="text" id="input-my-name" value="이몽룡" class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400">
                </div>

                <!-- Custom Partner Name -->
                <div>
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase mb-1">상대방 이름 변경 (보내는 사람)</label>
                    <input type="text" id="input-partner-name" class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400">
                    <p class="text-[10px] text-slate-400 mt-1">이름을 '엄마', '아빠'로 바꾸면 특별히 사랑 가득한 부모님 대화 모드로 자동 변경됩니다.</p>
                </div>

                <!-- Custom Partner Status message -->
                <div>
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase mb-1">상대방 상태메시지 설정</label>

                const osc2 = audioCtx.createOscillator();

                osc1.frequency.setValueAtTime(880, now); // A5

        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? '오후' : '오전';
            hours = hours % 12;
            hours = hours ? hours : 12;
            
            const timeStr = `${ampm} ${hours}:${minutes}`;
            document.getElementById('live-clock').innerText = `${hours}:${minutes}`;
            return timeStr;
        }
        setInterval(updateClock, 10000);
        updateClock();

        // Helper to format chat history strictly matching Gemini payload API schema
        function getGeminiHistory(charId) {
            const logs = chatLogs[charId].initialMsgs;
            // Filter to text and limit length to ensure fast performance & clear focus
            const textLogs = logs.filter(msg => msg.text && (!msg.type || msg.type === 'text'));
            
            // Map sender role appropriately
            return textLogs.slice(-12).map(msg => ({
                role: msg.sender === 'me' ? 'user' : 'model',
                parts: [{ text: msg.text }]
            }));
        }

        // Detect and filter repetitive phrases locally before sending
        function cleanAndFilterRepetitions(charId, originalText) {
            let text = originalText.trim();

            // 1. Remove all meta-text inside parentheses, brackets, or braces (AI's accidental rule leakage)
            text = text.replace(/\([\s\S]*?(말투|스타일|적용|상황|시나리오|호칭|사원|직급|지문|이름|가정|대화)[\s\S]*?\)/g, '');
            text = text.replace(/\[[\s\S]*?(말투|스타일|적용|상황|시나리오|호칭|사원|직급|지문|이름|가정|대화)[\s\S]*?\]/g, '');
            text = text.replace(/\{[\s\S]*?(말투|스타일|적용|상황|시나리오|호칭|사원|직급|지문|이름|가정|대화)[\s\S]*?\}/g, '');

            // 2. Remove quotation marks that wrapping the entire response
            text = text.replace(/^["']([\s\S]*?)["']$/g, '$1');

            // 3. Remove lines starting with markdown headers or bullets
            if (text.includes('\n-') || text.includes('\n*')) {
                text = text.split('\n').filter(line => !line.trim().startsWith('-') && !line.trim().startsWith('*')).join('\n');
            }

            text = text.trim();

            const logs = chatLogs[charId].initialMsgs;
            // Get the last 3 messages sent by the partner
            const lastPartnerMsgs = logs
                .filter(msg => msg.sender === 'other' && msg.text)
                .slice(-3)
                .map(msg => msg.text.trim());

            // Simple checker: If the output text is identical to any of the last 3 partner messages
            if (lastPartnerMsgs.includes(text) || lastPartnerMsgs.some(prev => prev.includes(text) || text.includes(prev))) {
                const variations = [
                    " 참, 그리고 있잖아!",
                    " 아, 맞다! 그리고",
                    " 갑자기 생각났는데 ㅎㅎ"
                ];
                const filler = variations[Math.floor(Math.random() * variations.length)];
                text = filler + " " + text;
            }
            return text.trim();
        }

        async function fetchAIResponse(charId, userMessage) {
            const apiKey = userApiKey || ""; // Canvas auto-injects if blank, otherwise uses user key
            const model = "gemini-3-flash-preview";
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
            
            const partnerName = characters[charId].name;
            const isMom = /엄마|어머니|엄니|맘|Mom/i.test(partnerName);
            const isDad = /아빠|아버지|아부지|Dad/i.test(partnerName);
            
            const isJokeRequest = userMessage.includes('농담') || userMessage.includes('개그') || userMessage.includes('웃겨줘') || userMessage.includes('재밌는');
            const chatHistory = getGeminiHistory(charId);
            
            let systemPrompt = "";
            
            if (isMom) {
                systemPrompt = `당신은 사용자를 세상에서 가장 소중하게 생각하고 사랑하는 '엄마(어머니)'입니다.
- 오직 실제 전송할 카톡 메시지 텍스트 1~2줄만 출력하십시오. 지침, 해설, 상황극 괄호는 절대 금지합니다.
- 자식을 걱정하고 격려하는 따뜻한 부모님의 말투만 구사하세요.`;
            } else if (isDad) {
                systemPrompt = `당신은 겉으론 든든하지만 속은 사랑이 가득한 '아빠(아버지)'입니다.
- 오직 실제 전송할 카톡 메시지 텍스트 1~2줄만 출력하십시오. 설명문, 상황극 괄호는 절대 금지합니다.
- 자식에게 깊은 신뢰와 사랑을 주는 든든한 조력자 아빠의 말투만 구사하세요.`;
            } else {
                systemPrompt = characters[charId].systemPrompt;
            }

            systemPrompt += `\n현재 상대방(나)의 카톡 닉네임은 '${myName}'입니다. 지침 해설이나 조건문 없이, 실제 카톡방 안에서 오직 상대방에게 보낼 메시지만 1~2문장 내외로 출력해야 합니다.`;

            if (isJokeRequest) {
                systemPrompt += `\n★매우 중요: 현재 사용자가 농담을 원하고 있으니, 캐릭터 성격에 걸맞은 건전하고 가벼운 말장난이나 재치 있는 농담을 한 구절 섞어주세요. 절대 괄호로 '상황 설명'을 붙이지 마세요.`;
            }

            const payload = {
                contents: chatHistory,
                systemInstruction: {
                    parts: [{ text: systemPrompt }]
                }
            };

            // Implementation of Exponential Backoff for stability
            let delay = 1000;
            const maxRetries = 2;
            
            for (let attempt = 0; attempt <= maxRetries; attempt++) {
                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP Error status: ${response.status}`);
                    }

                    const result = await response.json();
                    const aiText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (aiText) {
                        return cleanAndFilterRepetitions(charId, aiText);
                    }
                } catch (error) {
                    if (attempt === maxRetries) {
                        console.warn("Gemini API call failed. Using dynamic fallback generator.", error);
                        break;
                    }
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }

            // Return dynamically assembled random polite fallback if API call fails entirely
            return generateDynamicFallback(charId, isJokeRequest);
        }

        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            
            const timestamp = updateClock();
            
            // 1. Log and render user message with unread state active
            const newMsg = { sender: 'me', text: text, time: timestamp, read: false };
            chatLogs[currentCharacter].initialMsgs.push(newMsg);
            
            // Update sidebar room preview text
            const sidebarDesc = document.getElementById(`sidebar-desc-${currentCharacter}`);
            if (sidebarDesc) sidebarDesc.innerText = text;

            const bubbleHtml = createBubbleHtml('me', text, timestamp, false);
            messagesContainer.insertAdjacentHTML('beforeend', bubbleHtml);
            scrollToBottom();
            
            // Reset input fields
            chatInput.value = '';
            chatInput.style.height = 'auto';
            playKakaoSound();

            // 2. Simulate user reading and typing transition
            setTimeout(async () => {
                newMsg.read = true;
                renderChats();
                
                // Show dynamic typing indicator
                await triggerTypingResponse(text, currentCharacter);
            }, 600 + Math.random() * 400);
        }

        async function triggerTypingResponse(userMessage, targetCharId) {
            const charData = characters[targetCharId];
            
            // Show typing indicator only if user is currently looking at this active channel
            const isCurrentActive = (targetCharId === currentCharacter);

            if (isCurrentActive) {
                typingAvatar.src = charData.avatar;
                typingName.innerText = charData.name;
                typingIndicator.classList.remove('opacity-0', 'pointer-events-none');
                headerPartnerStatus.innerText = "입력 중...";
            }
            
            const typingStartTime = Date.now();

            try {
                // Fetch actual Gemini AI response
                const responseText = await fetchAIResponse(targetCharId, userMessage);
                
                // Realistic tempo: Ensure typing animation stays for at least 1.3 seconds
                const elapsedTime = Date.now() - typingStartTime;
                const minWait = 1300;
                if (elapsedTime < minWait && isCurrentActive) {
                    await new Promise(res => setTimeout(res, minWait - elapsedTime));
                }

                if (isCurrentActive) {
                    typingIndicator.classList.add('opacity-0', 'pointer-events-none');
                    headerPartnerStatus.innerText = charData.statusMsg || "온라인";
                }
                
                const timestamp = updateClock();
                chatLogs[targetCharId].initialMsgs.push({
                    sender: 'other',
                    text: responseText,
                    time: timestamp,
                    read: isCurrentActive // if looking at it, it's read immediately
                });
                
                // Update sidebar preview
                const sidebarDesc = document.getElementById(`sidebar-desc-${targetCharId}`);
                if (sidebarDesc) sidebarDesc.innerText = responseText.substring(0, 30);

                if (isCurrentActive) {
                    renderChats();
                    playKakaoSound();
                } else {
                    // Show top-level real-time toast notification if message is received in background
                    showNotificationToast(targetCharId, charData.name, responseText, charData.avatar);
                    
                    // Show a badge on sidebar icon
                    document.getElementById('sidebar-badge').classList.remove('hidden');
                }

            } catch (err) {
                if (isCurrentActive) {
                    typingIndicator.classList.add('opacity-0', 'pointer-events-none');
                    headerPartnerStatus.innerText = charData.statusMsg || "온라인";
                }
                console.error("Critical error in message generation loop:", err);
            }
        }

                const partnerName = characters[currentCharacter].name;
                const isParent = /엄마|어머니|아빠|아버지/i.test(partnerName);
                const replyText = isParent ? "아이구, 우리 딸/아들이 보낸 사랑에 눈물이 나려 그러네. 시원하게 아주 고맙게 잘 마실게, 고맙고 사랑해~" : "앗! 이렇게 깜짝 선물을 주다니 너무 고마워 ㅠㅠ 감동이야, 시원하게 잘 마실게!";
                triggerTypingResponse(replyText, currentCharacter);
            }, 1500);
        }

        function simulateIncomingCall() {
            toggleMediaMenu();
            headerPartnerStatus.innerText = "전화 연결 중...";
            
            setTimeout(() => {
                const timestamp = updateClock();
                chatLogs[currentCharacter].initialMsgs.push({ 
                    sender: 'other', 
                    text: "보이스톡 종료", 
                    time: timestamp, 
                    type: 'call'
                });
                renderChats();
                headerPartnerStatus.innerText = characters[currentCharacter].statusMsg || "온라인";
                playKakaoSound();
            }, 3000);
        }

        function toggleSidebar(show) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (show) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                document.getElementById('sidebar-badge').classList.add('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function openEmojiPicker() {
            document.getElementById('emoji-picker-modal').classList.remove('hidden');
        }

        function closeEmojiPicker() {
            document.getElementById('emoji-picker-modal').classList.add('hidden');
        }

        function toggleMediaMenu() {
            const modal = document.getElementById('media-modal');
            modal.classList.toggle('hidden');
        }

        function openSettingsModal() {
            document.getElementById('input-partner-name').value = characters[currentCharacter].name;
            document.getElementById('input-partner-status-msg').value = characters[currentCharacter].statusMsg || "온라인";
            document.getElementById('input-my-name').value = myName;
            document.getElementById('input-api-key').value = userApiKey;
            document.getElementById('settings-modal').classList.remove('hidden');
        }

        function closeSettingsModal() {
            document.getElementById('settings-modal').classList.add('hidden');
        }

        function saveSettings() {
            const newPartnerName = document.getElementById('input-partner-name').value.trim();
            const newPartnerStatusMsg = document.getElementById('input-partner-status-msg').value.trim();
            const newMyName = document.getElementById('input-my-name').value.trim();
            const newApiKey = document.getElementById('input-api-key').value.trim();
            
            if (newPartnerName) {
                characters[currentCharacter].name = newPartnerName;
                
                // Update avatar placeholder text with edited name
                const shortName = newPartnerName.substring(0, 2);
                const bgColors = { minwoo: 'fbbf24', saea: 'ec4899', boss: '6b7280', jieun: '10b981' };
                const color = bgColors[currentCharacter] || '3b82f6';
                characters[currentCharacter].avatar = `https://placehold.co/100x100/${color}/ffffff?text=${encodeURIComponent(shortName)}`;
                
                // Update Sidebar labels
                const nameLabel = document.getElementById(`sidebar-name-${currentCharacter}`);
                if (nameLabel) nameLabel.innerText = newPartnerName;
                
                const avatarImg = document.getElementById(`sidebar-avatar-${currentCharacter}`);
                if (avatarImg) avatarImg.src = characters[currentCharacter].avatar;

                // Update Active header
                headerPartnerName.innerHTML = `${newPartnerName} <i data-lucide="pencil" class="w-3 h-3 text-slate-600"></i>`;
                headerAvatar.src = characters[currentCharacter].avatar;
            }

            if (newPartnerStatusMsg) {
                characters[currentCharacter].statusMsg = newPartnerStatusMsg;
                headerPartnerStatus.innerText = newPartnerStatusMsg;
            }

            if (newMyName) {
                myName = newMyName;
            }
            
            userApiKey = newApiKey;
            
            closeSettingsModal();
            lucide.createIcons();
            renderChats();
        }

        function changeTheme(colorCode) {
            document.getElementById('chat-header').style.backgroundColor = colorCode;
            document.getElementById('chat-window').style.backgroundColor = colorCode;
            document.getElementById('status-dot').style.borderColor = colorCode;
        }

        function toggleDarkMode(isDark) {
            if (isDark) {
                document.documentElement.classList.add('dark');
                document.body.classList.add('dark:bg-slate-900');
            } else {
                document.documentElement.classList.remove('dark');
                document.body.classList.remove('dark:bg-slate-900');
            }
        }

        function resetAllChats() {
            chatLogs = JSON.parse(JSON.stringify(characters));
            renderChats();
            closeSettingsModal();
        }

        function viewPhoto(url) {
            const overlay = document.createElement('div');
            overlay.className = "fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 cursor-pointer animate-fade-in";
            overlay.onclick = () => overlay.remove();
            
            const img = document.createElement('img');
            img.src = url;
            img.className = "max-w-full max-h-[85vh] rounded-xl shadow-2xl transition-transform duration-300 transform scale-95 hover:scale-100";
            
            overlay.appendChild(img);
            document.body.appendChild(overlay);
        }

        window.onload = function() {
            lucide.createIcons();
            selectCharacter('minwoo');
            
            // Randomly trigger an incoming background message from another character after 6 seconds to show off the toast/VAD notification
            setTimeout(() => {
                const backgroundChars = ['saea', 'boss', 'jieun'];
                const randomId = backgroundChars[Math.floor(Math.random() * backgroundChars.length)];
                
                let text = "오늘 좋은 하루 보내고 계신가요?";
                if (randomId === 'boss') {
                    text = "이대리, 세상에서 가장 아름다운 고양이는 뭔지 아나? 바로 '무지개냥'이라네! 허허허,, 즐거운 오후 보내게나^^";
                } else if (randomId === 'saea') {
                    text = "너 아까 길에서 지나치지 않았어? ㅋㅋㅋ 암튼 날씨 엄청 좋다!";
                } else if (randomId === 'jieun') {
                    text = "대리님, 세상에서 가장 뜨거운 과일이 뭔지 아세요? 바로 '천혜향'이래요! 오늘도 파이팅해요! ㅎㅎ";
                }
                
                triggerTypingResponse(text, randomId);
            }, 6000);
        }
    </script>
</body>
</html>
